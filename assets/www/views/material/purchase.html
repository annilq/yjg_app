<div class=header> <back-btn></back-btn> 材料计划 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required" ng-click=chooseinfo()> <div class=item-label>仓库名称</div> <div class=flow-content>  {{param.warehouseName}} </div> </div> <div class="list-item required"> <div class=item-label>需要入库</div> <label class=flow-content> <select ng-model=param.needEntry ng-options="item.value as item.key for item in checkTypeList"> <option>请选择</option> </select> </label> </div> <div class="list-item required"> <div class=item-label>直接入库</div> <label class=flow-content> <select ng-model=param.directEntry ng-options="item.value as item.key for item in checkTypeList"> <option>请选择</option> </select> </label> </div> <div class=list-item> <div class=item-label>计划编号</div> <div class=flow-content> <input type=text ng-model=param.planNo> </div> </div> <div class="list-item icon_more"> <div class=item-label>需用起始日期</div> <div class=flow-content> <input type=text date-directive id=start_date ng-model=param.useDate> </div> </div> <div class="list-item icon_more"> <div class=item-label>需用截止日期</div> <div class=flow-content> <input type=text date-directive id=end_date ng-model=param.useCloseDate> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>采购事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.purchaseReason></textarea> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remarks></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment></div> <div class="list table-list"> <div class=info-title> 采购材料明细（从以下列表选择） <div> <span class="c-blue mr10" ng-click=chooseformlist()>材料清单</span> <span class=c-blue ng-click=chooseformplan()>用料总计划</span> <span class="c-blue fr" ng-show="param.details.length>0">共{{param.details.length}}条</span> </div> </div>  <div class=table-item ng-repeat="item in param.details"> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>名称 </div> <div class=flow-content>{{ item.name }}</div> </div> <div class=list-item> <div class=item-label>规格型号 </div> <div class=flow-content>{{ item.spec }}</div> </div> <div class=list-item> <div class=item-label>品牌特性 </div> <div class=flow-content> <input type=text ng-model=item.brand> </div> </div> <div class="list-item required"> <div class=item-label>采购数量 </div> <div class=flow-content> <input type=text ng-model=item.quantity tel-directive> </div> </div> <div class="list-item required"> <div class=item-label>单价 </div> <div class=flow-content> <input type=text ng-model=item.price tel-directive> </div> </div> <div class=list-item> <div class=item-label>备注 </div> <div class=flow-content> <input type=text ng-model=item.remark> </div> </div> </div> <div class="delete_icon icon_del" ng-click=deleteItem($index)></div> </div> </div>  <div log-list taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id="{{ param.processInstanceId }}" submit=submit validate=validate></div>
