<div class=header> <back-btn></back-btn> 工作任务 </div> <div class="container taskpage"> <div class=search_input_wrapper> <div class=search_input ng-click=mytask.showSearch()> <span class=BgRwsearch></span> 筛选</div> </div> <div class="task-tab flex"> <div class=sub-task-item ng-click=mytask.submenuhandle(item.key) ng-class="{active:mytask.curtab==item.key}" ng-repeat="item in mytask.subtabList"> {{item.value}} </div> </div> <div class="list lh30 task-list" infinite-scroll=mytask.datalist.nextPage() infinite-scroll-disabled=mytask.datalist.busy infinite-scroll-distance=0 infinite-scroll-container='".taskpage"'> <div class="list-item celled lh25 flex" ng-class="{'done':item.status==2}" ng-repeat="item in mytask.datalist.items track by item.pkId" ng-click=mytask.goDetail(item)> <div class=w20> <div class="item-avtar tc lh50" ng-if="item.status==1"> <img ng-src={{item.portrait}} ng-if=item.portrait> {{item.personName}} </div> <div class="done-avtar item-avtar" ng-if="item.status==2"> </div> </div> <div class=w80>  <div class="te w80" ng-class="{'c9':item.status==2}">{{item.content}}</div> <div class="c9 fs12"> {{item.expiryDate|dateFmt}} </div> </div> </div> <div ng-show=!mytask.datalist.items.length class="noData tc">{{mytask.datalist.tip}}</div> </div> </div> <div class="flex footer tc new-task-btn" ng-click=mytask.newtask()> <div> <span class=new-task-icon></span> 写任务</div> </div> <div class="list tablestyle pickceritem task-pickcer" ng-show=mytask.showCerPicker> <div class="list-item list-content"> <div class=picker-label>内容</div> <div class=picker-value> <input type=text ng-model=mytask.picker.content> </div> </div> <div class="list-item list-content"> <div class=picker-label>负责人</div> <div class=picker-value> <input type=text ng-model=mytask.picker.leaderName> </div> </div> <div class="list-item list-content"> <div class=picker-label>状态</div> <div class=picker-value> <select ng-model=mytask.picker.status ng-options="item.value as item.key for item in mytask.statuslist" style=width:100%> <option>请选择</option> </select> </div> </div> <div class="pickceritem-btn tc flex"> <div class=confirm ng-click=mytask.confirmDialog()>筛选</div> <div class=cancel ng-click=mytask.cacelDialog()>取消</div> </div> </div>
