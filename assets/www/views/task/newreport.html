<div class=header> <back-btn></back-btn> 工作报告 </div> <div class="container newreport"> <div class=list> <label class="list-item icon_more required"> <p class=item-label>报告类型:</p> <p class=flow-content> <select ng-model=newreport.param.reportType ng-options="item.value as item.key for item in newreport.reportTypelist" style=width:100%> <option>请选择</option> </select> </p> </label> <label class="list-item icon_more required"> <p class=item-label>报告日期:</p> <p class=flow-content> <input type=text date-directive ng-model=newreport.param.reportDate class=c0> </p> </label> <div class="list-item required list-item-textarea"> <div class=item-label> 已完成的工作</div> <div class=flow-content> <textarea ng-model=newreport.param.content maxlength=1000 placeholder=请输入内容></textarea> </div> </div> <div class="list-item list-item-textarea" ng-class="{ 'required': newreport.input_required }"> <div class=item-label> 未完成的工作</div> <div class=flow-content> <textarea ng-model=newreport.param.unfinishedWork maxlength=1000 placeholder=请输入内容></textarea> </div> </div> <div class="list-item list-item-textarea" ng-class="{ 'required': newreport.input_required }"> <div class=item-label> 需协助的工作</div> <div class=flow-content> <textarea ng-model=newreport.param.assistedWork maxlength=1000 placeholder=请输入内容></textarea> </div> </div> <div class="list-item list-item-textarea" ng-class="{ 'required': newreport.input_required }"> <div class=item-label> 遇到的困难</div> <div class=flow-content> <textarea ng-model=newreport.param.difficultWork maxlength=1000 placeholder=请输入内容></textarea> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label> 建议及备注</div> <div class=flow-content> <textarea ng-model=newreport.param.remark maxlength=1000 placeholder=请输入内容></textarea> </div> </div> <div class="list-item list-item-textarea" ng-class="{ 'required': newreport.input_required }"> <div class=item-label> 下一步的工作</div> <div class=flow-content> <textarea ng-model=newreport.param.nextWork maxlength=1000 placeholder=请输入内容></textarea> </div> </div>  <div user-defined field-map=newreport.param.fieldMap validation=newreport.validation uid=newreport.param.uid processid=newreport.param.processInstanceId></div> <div class="list-item required notice-item"> <p class=item-label>关注人:</p> <section class=flow-content> <div class="notice-radio fr sm" ng-click=newreport.getlastuser() ng-class={checked:newreport.param.hasGetFollowed}> <div class=circle></div> </div> 加载上次 </section> </div> <div class=joinpeople-list> <div class=joinpeople-wrapper> <div class="joinpeople-item tc"> <img src=images/add-peo.png ng-click=newreport.choosepeople() width=50px> <p class=te>添加</p> </div> <div class="joinpeople-item tc" ng-repeat="item in newreport.param.followList track by item.id||item.userId"> <div class="item-avtar lh50"> <img ng-src={{item.iconCls}} ng-if=item.iconCls>{{item.name||item.personName|username}} </div> <p class=te>{{item.name||item.personName}}</p> <p class=icon_del1 ng-click=newreport.delpersons($index)>del</p> </div> </div> </div>  <div class=file-upload file-upload file-data=newreport.param.attachment> </div> </div> </div> <div class="flex footer tc"> <div class=w50 ng-click=newreport.savetodraft() ng-show="newreport.param.status!=1"><span class=save-draft></span>保存草稿</div> <div class="w50 c-blue" ng-click=newreport.submit()><span class=submit-flow></span>提交</div> </div>
