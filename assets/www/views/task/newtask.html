<div class=header> <back-btn></back-btn> 新建任务 </div> <div class="container finance new-task"> <div class="list f_sk"> <div class=list-item> <div class=edit-content> <textarea cols=30 rows=10 ng-model=newtask.data.content placeholder=输入任务详情 maxlength=1000></textarea> </div> </div>  <div class=list-item-textarea file-upload file-data=newtask.data.attachment hidelabel=true> </div> <div class="joinpeople-list cl lh20 md mt15"> <div class="joinpeople-item tc" ng-repeat="item in newtask.data.participantList"> <div class="item-avtar md lh45"> <img ng-src={{item.portrait}} ng-if=item.portrait> {{item.personName|username}}</div> <div class="name fs12"> {{item.personName}}</div> <p class=icon_del1 ng-click=newtask.delpersons($index)>del</p> </div> <div class="joinpeople-item tc"> <img src=images/icon-add.png ng-click=newtask.choosepeople() width=45px> <div class="c9 fs12">添加成员</div> </div> </div> <div class="list-item leader-name flex icon_enter required"> <div class=w30> 主要负责人 </div> <div class="w70 c1c1 tr"> <select class=tr ng-model=newtask.data.leaderId ng-options="item.userId as item.personName for item in newtask.data.participantList" dir=rtl style=width:100%> </select> </div> </div> <div class="list-item flex icon_enter mt15 required"> <div class=w30> 截止日期 </div> <div class="w70 c1c1 tr"> <input type=text placeholder=选填 class=tr ng-model=newtask.data.expiryDate date-directive> </div> </div> <div class="list-item mt15 flex" ng-click=newtask.showrelModule()> <div class=w25>关联模块</div> <div class="w75 sign-select"> <select style="width: 100%;" ng-model=newtask.data.relatedModuleName ng-options="item.key as item.key for item in newtask.relmodlist" ng-change=newtask.modulechange()> <option>请选择</option> </select> </div> </div> <div class="list-item mt15 flex"> <div class=w25>模块编号</div> <div class=w75 ng-click=newtask.chooseinfo()> <p class="tip te">{{newtask.data.moduleNo||"点击选择"}}</p> </div> </div> <div class=px-3> <div class="btn mt15" ng-click=newtask.addtask()>完成</div> </div> </div> </div>
