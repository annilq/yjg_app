<div class=header> <back-btn></back-btn> 任务设置 </div> <div class="container finance task-setting"> <div class="list f_sk"> <div class="list-item flex icon_enter lh20" ng-click=tasksetting.editcontent()> <div class=w30> 任务详情 </div> <div class="w70 c1c1 task-setting-content" ng-bind-html=tasksetting.data.content|parsetohtml></div> </div> <div class="joinpeople-list mt15 cl md"> <div class="joinpeople-item tc" ng-repeat="item in tasksetting.data.participantList"> <div class="item-avtar md lh45"> <img ng-src={{item.portrait}} ng-if=item.portrait> {{item.personName|username}}</div> <div class="name fs12"> {{item.personName}}</div> <p class=icon_del1 ng-click=tasksetting.delpersons($index)>del</p> </div> <div class="joinpeople-item tc"> <img src=images/icon-add.png ng-click=tasksetting.choosepeople() width=45px> <div class=fs12>添加成员</div> </div> </div> <div class="list-item leader-name flex icon_enter required"> <div class=w30> 主要负责人 </div> <div class="w70 c1c1 tr"> <select class=tr ng-model=tasksetting.data.leaderId ng-options="item.userId as item.personName for item in tasksetting.data.participantList" dir=rtl style=width:100%> </select> </div> </div> <div class="list-item flex icon_enter mt15 required"> <div class=w30> 截止日期 </div> <div class="w70 c1c1 tr"> <input type=text class=tr ng-model=tasksetting.data.expiryDate date-directive placeholder=选填> </div> </div> <div class="list-item mt15 flex icon_enter" ng-click=tasksetting.showrelModule()> <div class=w25>关联模块</div> <div class="w75 sign-select"> <select style="width: 100%;" ng-model=tasksetting.data.relatedModuleName ng-options="item.key as item.key for item in tasksetting.relmodlist" ng-change=tasksetting.modulechange()><option>请选择</option></select> </div> </div> <div class="list-item mt15 flex icon_enter"> <div class=w25>模块编号</div> <div class=w75 ng-click=tasksetting.chooseinfo()> <p class="tip te">{{tasksetting.data.moduleNo||"点击选择"}}</p> </div> </div> </div> </div> <div class="flex footer tc footer-withhr"> <div class="w50 c-blue" ng-click=tasksetting.save()><span class=submit-flow></span>保存</div> <div class=w50 ng-click=tasksetting.confirmdel()> <span class=delete-flow></span> 删除 </div> <div class=hr></div> </div>
