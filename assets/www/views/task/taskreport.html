<div class=header> <back-btn></back-btn> 工作报告 </div> <div class="container reportpage"> <div style="height: 100%;"> <div class=search_input_wrapper> <div class=search_input ng-click=taskreport.showSearch()> <span class=BgRwsearch></span>筛选</div> </div>  <div class="report-menu flex tc report-tab"> <div class=report-item ng-repeat="item in taskreport.datalist" ng-click=taskreport.switchmenu(item.type) ng-class="{active:item.type==taskreport.menutype}">{{item.value}}</div> </div> <div class="list report-list lh30 menutype{{taskreport.menutype}}" infinite-scroll=taskreport.reportList.nextPage() infinite-scroll-disabled=taskreport.reportList.busy infinite-scroll-distance=0 infinite-scroll-container='".reportpage"'> <div class="list-item celled lh25" ng-repeat="item in taskreport.reportList.items track by item.pkId" ng-click=taskreport.goDetail(item)> <div class="flex list-item-title"> <div class="item-avtar tc"> <img ng-src={{item.portrait}} ng-if=item.portrait> {{item.personName}} </div> <div class=te> {{item.title}} </div>  <p class="fs12 tr w20"> <span ng-if="taskreport.menutype==3" class=report-unread></span> <span class=report-time>{{item.createDate|dateFmt:'MM/dd'}}</span> </p> </div>  <p class="fs14 te w80">{{item.content}}</p> </div> <div ng-show=!taskreport.reportList.items.length class="noData tc">{{taskreport.reportList.tip}}</div> </div> </div> </div> <div class="flex footer tc new-task-btn" ng-click=taskreport.newReport()> <div> <span class=new-task-icon></span>写报告</div> </div> <div class="list tablestyle pickceritem task-pickcer" ng-show=taskreport.showCerPicker> <div class="list-item list-content"> <div class=picker-label>报告类型</div> <div class=picker-value> <select ng-model=taskreport.picker.reportType ng-options="item.value as item.key for item in taskreport.reportTypelist" style=width:100%> <option>请选择</option> </select> <div class=task-indicator-icon></div> </div> </div> <div class="list-item list-content"> <div class=picker-label>创建人</div> <div class=picker-value> <input type=text ng-model=taskreport.picker.personName placeholder=请输入> </div> </div> <div class="list-item list-content"> <div class=picker-label>标题</div> <div class=picker-value> <input type=text ng-model=taskreport.picker.title placeholder=请输入> </div> </div> <div class="pickceritem-btn tc flex"> <div class=confirm ng-click=taskreport.confirmDialog()>筛选</div> <div class=cancel ng-click=taskreport.cacelDialog()>取消</div> </div> </div>
