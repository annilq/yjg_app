<div class=header> <back-btn></back-btn> 意见反馈 </div> <div class="container feedback" style=background-color:#eee> <form enctype=multipart/form-data method=post name=fileinfo> <div class=q-item> <p class=c9>请选择意见类型</p> <div class="content list"> <div class=lh40 ng-repeat="item in type" ng-class="{celled:$index!=2}"> <label class=cl>{{item.text}} <input type=radio value={{item.value}} name=ptype ng-model=param.type class=fr> </label> </div> </div> </div> <div class=q-item> <p class=c9><span class=c-red>*</span>问题和意见</p> <div class=content> <textarea rows=5 ng-model=param.content placeholder=请简要描述你的问题和意见></textarea> </div> </div> <div class=q-item> <p class=c9><span class=c-red>*</span>联系电话</p> <div class=content> <input type=tel ng-model=param.contactWay placeholder=必填，便于我们与您联系> </div> </div> <div class=q-item> <div class="btn g-btn" ng-click=submit()>提交</div> </div> </form> </div>
