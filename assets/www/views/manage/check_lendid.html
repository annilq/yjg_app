<div class=header> <back-btn></back-btn> 借证件 </div> <div class="container finance task-review"> <div class="list f_sk"> <div user-info no=TaskReview.result.receiveNo depname=TaskReview.result.receiveDepartment date=TaskReview.result.applyDate username=TaskReview.result.userName></div> <div class=section> <div class="list-item flex"> <div class=label>预计归还日期</div> <div class=w60> {{TaskReview.result.returnDate|dateFmt}} </div> </div> <div class="list-item flex"> <div class=label>借证事由</div> <div class=w60>{{TaskReview.result.receiveDesc}}</div> </div>  <div class="list-item flex" ng-hide=TaskReview.result.projectNo> <div class=label>工程名称</div> <div class=w60 relative-module=bid_apply module-no="{{TaskReview.result.formBidApply&& TaskReview.result.formBidApply.bidFileNo}}">{{TaskReview.result.projectName}}</div> </div> <div class="list-item flex"> <div class=label>所属项目</div> <div class=w60 relative-module=Xm_ProjectStore module-no={{TaskReview.result.projectNo}}>{{TaskReview.result.projectName}}</div> </div> <div class="list table-list" ng-show=TaskReview.result.certificates.length> <div class=info-title>借证明细</div> <div class=table-item ng-repeat="item in TaskReview.result.certificates"> <div class=list-item> <div class=item-label>证件编号</div> <div class=flow-content relative-module=Chief_Certificate module-no={{item.certificateId}}> {{item.certificateId}}</div> </div> <div class=list-item> <div class=item-label>姓名</div> <div class=flow-content>{{item.ownerName}}</div> </div> <div class=list-item> <div class=item-label>证书类别</div> <div class=flow-content>{{item.certificateType}}</div> </div> <div class=list-item> <div class=item-label>专业</div> <div class=flow-content>{{item.major}}</div> </div> </div> </div>  <div checkuser-define field-map=TaskReview.result.customFields></div> </div>  <div log-list status=processStatus taskid=process_id></div> <div class="list-item flex expressNo" ng-show=showaudit> <div class="c9 w30">快递单号:</div> <div class=w70> <input type=text ng-model=expressNo placeholder=请输入快递单号> </div> </div> </div> </div>
