<div class=header> <back-btn></back-btn> 还证件 </div> <div class="container finance"> <div class="list f_sk"> <div class=list-item> <div class=item-label>快递单号:</div> <div class=flow-content> <input type=text ng-model=param.expressNo> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div> <div class="list-item icon_more required" ng-click=getChoosecertId()> <div class=item-label>还证明细:</div> <div class=flow-content>{{param.certificates.length}}</div> </div> <div class="list table-list"> <div class=info-title ng-show=param.certificates.length>已选择证件</div> <div class=table-item ng-repeat="item in param.certificates"> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>证件编号</div> <div class=flow-content>{{item.certificateId}}</div> </div> <div class=list-item> <div class=item-label>姓名</div> <div class=flow-content>{{item.ownerName}}</div> </div> <div class=list-item> <div class=item-label>证书类别</div> <div class=flow-content>{{item.certificateType}}</div> </div> <div class=list-item> <div class=item-label>专业</div> <div class=flow-content>{{item.major}}</div> </div> </div> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
