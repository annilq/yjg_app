<div class=header> <back-btn></back-btn> 借业绩 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more" ng-click=choosePeople()> <div class=item-label>所属投标申请单</div> <div class=flow-content>{{param.bidFileNo}}</div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>借业绩事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div> <label class="list-item icon_more required"> <div class=item-label>预计归还日期</div> <div class=flow-content> <input type=text date-directive id=start_date ng-model=param.returnDate> </div> </label> <div class="list-item icon_more required" ng-click=chooseProList()> <div class=item-label>业绩工程名称</div> <div class=flow-content>{{param.projectName}}</div> </div> <div class="selectinfo required"> <div class=info-title ng-show=detailListArr.length>证明材料(可多选)</div> <div class="list select-list"> <div class="list-item lh40 px-3" ng-repeat="item in detailListArr|filter:availableCount" ng-click=toggle(item) ng-class="{'selected':item.selected}"> {{item.dataType||item.perName}} </div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
