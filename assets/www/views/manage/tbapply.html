<div class=header> <back-btn></back-btn> 投标申请单 </div> <div class="container finance"> <div class="list f_sk"> <div class=list-item> <div class=item-label>暂定投标费用:</div> <div class=flow-content> <input type=tel ng-model=param.tentativeCost tel-directive> </div> </div> <div class="list-item icon_more"> <div class=item-label>资质要求:</div> <div class=flow-content> <label class=multiple> <span class=select-value>{{param.qualityReqArr.toString()}}</span> <select multiple ng-model=param.qualityReqArr ng-options="item.value as item.key for item in zztypelist"> <option>请选择</option> </select> </label> </div> </div> <div class=list-item> <div class=item-label>业绩要求:</div> <div class=flow-content> <input type=text maxlength=150 ng-model=param.performanceReq> </div> </div> <div class=list-item> <div class=item-label>其他要求:</div> <div class=flow-content> <input type=text maxlength=150 ng-model=param.otherReq> </div> </div> <div class="list-item icon_more required"> <div class=item-label>开标时间</div> <div class=flow-content> <input type=text ng-model=param.openBidDate date-directive datetype=datetime> </div> </div> <city-select param=param></city-select> <div class="list-item icon_more required"> <div class=item-label>经营模式:</div> <label class=flow-content> <select ng-model=param.bidTypeStr ng-options="item.value as item.key for item in tbwaylist"> <option>请选择</option> </select> </label> </div> <div class="list-item required"> <div class=item-label>建设单位:</div> <div class=flow-content> <input type=text maxlength=150 placeholder=必填 ng-model=param.developers> </div> </div> <div class="list-item icon_more"> <div class=item-label>合作伙伴:</div> <div class=flow-content> <input type=text ng-model=param.customerName> <p class=project_name ng-click=choosePeople()></p> </div> </div> <div class="list-item icon_more required"> <div class=item-label>工程类型:</div> <div class=flow-content> <label class=multiple> <span class=select-value>{{param.projectTypeArr.toString()}}</span> <select multiple ng-model=param.projectTypeArr ng-options="item.value as item.key for item in projectTypelist"> <option>请选择</option> </select> </label> </div> </div> <div class="list-item required"> <div class=item-label>工程名称:</div> <div class=flow-content> <input type=text maxlength=150 placeholder=必填 ng-model=param.projectName> </div> </div> <div class="list-item icon_more"> <div class=item-label>生成公告</div> <div class=flow-content style=padding-right:0> <select ng-model=param.autoBuildNotice> <option></option> <option value=1>是</option> <option value=0>否</option> </select> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>招标公告网址</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.bidUrl></textarea> </div> </div> <div class="list-item required"> <div class=item-label>建造师</div> <div class=flow-content> <input type=text ng-model=param.constructor_> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark maxlength=300></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.bidNoticePath> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
