div> </div> <div class="list-item list-content"> <div class=col-1-4>专业</div> <div class=col-3-4> <input type=text ng-model=picker.remark> </div> </div> </div> <div class="pickceritem-btn tc flex"> <div class=cancel ng-click=cacelDialog()>取消</div> <div class=confirm ng-click=confirmDialog()>确定</div> </div> </div>
