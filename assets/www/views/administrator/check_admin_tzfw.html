<div class=header> <back-btn></back-btn> 通知发文 </div> <div class="container finance task-review"> <div class="list f_sk"> <div user-info no=TaskReview.result.docNum depname=TaskReview.result.departmentName date=TaskReview.result.applyDate username=TaskReview.result.userName></div> <div class=section> <div class="list-item flex"> <div class=label>类别</div> <div class=w60>{{TaskReview.result.docType}}</div> </div> <div class="list-item flex"> <div class=label>标题</div> <div class=w60> {{TaskReview.result.docName}} </div> </div> <div class="list-item flex"> <div class=label>秘密等级</div> <div class=w60 ng-switch=TaskReview.result.secretLevel> <div ng-switch-when=1> 秘密 </div> <div ng-switch-when=2> 机密 </div> <div ng-switch-when=3> 绝密 </div> <div ng-switch-when=4> 公开 </div> </div> </div> <div class="list-item flex"> <div class=label>缓急等级</div> <div class=w60 ng-switch=TaskReview.result.hurryLevel> <div ng-switch-when=1> 紧急 </div> <div ng-switch-when=2> 加急 </div> <div ng-switch-when=3> 普通 </div> </div> </div> <div class="list-item flex"> <div class=label>备注</div> <div class=w60>{{TaskReview.result.remark}}</div> </div> <div class="list-item flex" ng-hide=TaskReview.result.completDocUrl||TaskReview.result.docUrl> <div class=label>初始文件</div> <div class="w60 c-blue" ng-click=goDetail(TaskReview.result.docUrl)>{{TaskReview.result.docUrl|fileName}}</div> </div> <div class=info-title>可查看人员</div> <div class="joinpeople-list px-3"> <div class=joinpeople-wrapper> <div class="joinpeople-item tc mt10" ng-repeat="item in (TaskReview.result.sendScope|spliceDep:',') track by $index"> <div class="item-avtar lh50">{{item|username}}</div> <p class="fs12 mt5">{{item}}</p> </div> </div> </div>  <div checkuser-define field-map=TaskReview.result.customFields></div>  <div class=file-upload file-list checked=true file-data=TaskReview.result.completDocUrl||TaskReview.result.docUrl> </div> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>
