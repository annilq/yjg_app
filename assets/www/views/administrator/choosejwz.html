<div class=header> <back-btn cleancache=no></back-btn> 物资 </div> <div class="container pagetablestyle"> <div class=search_input_wrapper> <input type=text class=search_input ng-model=searchInput ng-model-options="{ debounce: 1000 }" ng-change=search(filterSql) placeholder=搜索> </div> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container='".pagetablestyle"'> <div class=table-item ng-repeat="item in taskList.items track by $index" ng-click=choosePeople(item) ng-class="{'selected':item.selected}"> <div class=list-item> <div class=item-label>物资名称</div> <div class=flow-content>{{item.materialName}}</div> </div> <div class=list-item> <div class=item-label>单位</div> <div class=flow-content>{{item.unit}}</div> </div> <div class=list-item ng-show=item.specifications> <div class=item-label>规格型号</div> <div class=flow-content>{{item.specifications}}</div> </div> <div class=list-item> <div class=item-label>可用库存</div> <div class=flow-content>{{item.availableCount}}</div> </div> <div class=list-item> <div class=item-label>是否需要归还</div> <div class=flow-content>{{item.needToReturn?"需要归还":"无需归还"}}</div> </div> <div class=list-masker></div> </div> </div> <div class="noData tc" ng-show=!taskList.items.length>{{taskList.tip}}</div> </div> <div class="flex footer tc" ng-click=submit()> <div class="b-btn w50">确定</div> </div>
