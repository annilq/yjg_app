<div class=header> <back-btn></back-btn> 还印章 </div> <div class="container finance"> <div class="list f_sk"> <div class=list-item> <div class=item-label>快递单号</div> <div class=flow-content> <input type=text ng-model=param.expressNo> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div> <div class="list-item icon_more required" ng-click=getChoosecertId()> <div class=item-label>还印章明细</div> <div class=flow-content>{{param.seals.length}}</div> </div> <div class="list table-list"> <div class=info-title ng-show=param.seals.length>已选择印章</div> <div class=table-item ng-repeat="item in param.seals"> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content>{{item.fileNo}}</div> </div> <div class=list-item> <div class=item-label>印章类别</div> <div class=flow-content>{{item.sealType}}</div> </div> <div class=list-item> <div class=item-label>印章字样</div> <div class=flow-content>{{item.sealText}}</div> </div> </div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
