<div class=header> <back-btn></back-btn> 证件调配 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more" ng-click=chooseinfo()> <div class=item-label>所属投标申请单</div> <div class=flow-content>{{param.moduleNo}}</div> </div> <div class="list-item readonly"> <div class=item-label>工程名称</div> <div class=flow-content> <input type=text ng-model=param.projectName> </div> </div> <div class="list-item required"> <div class=item-label>调证时间段</div> <div class="flow-content flex"> <div class=w45> <input type=text date-directive ng-model=param.startUseDate placeholder=起始时间> </div> <div class=w10> 至 </div> <div class=w45> <input type=text date-directive ng-model=param.endUseDate placeholder=结束时间> </div> </div> </div> <div class="list-item required icon_more" ng-click=choosePeople()> <div class=item-label>持证人</div> <div class=flow-content>{{param.applyUserName}}</div> </div> <div class="list-item list-item-textarea"> <div class=item-label>调证事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div> <div class="list-item icon_more required" ng-click=getChoosecertId()> <div class=item-label>添加调配证件</div> <div class=flow-content>{{param.certificates.length}}</div> </div> <div class="list table-list"> <div class=info-title ng-show=param.certificates.length>证件明细</div> <div class=table-item ng-repeat="item in param.certificates"> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content>{{item.certificateId}}</div> </div> <div class=list-item> <div class=item-label>类别</div> <div class=flow-content>{{item.certificateType}}</div> </div> <div class=list-item> <div class=item-label>姓名</div> <div class=flow-content>{{item.ownerName}}</div> </div> <div class=list-item> <div class=item-label>专业</div> <div class=flow-content>{{item.major}}</div> </div> </div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
