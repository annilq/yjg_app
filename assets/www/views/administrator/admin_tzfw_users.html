<div class=header> <back-btn cleancache=no></back-btn> 查看人员 <div class=right-btn ng-click=adminTzfwUsers.confirm()> 完成 </div> </div> <div class=container> <div class=search_input_wrapper> <input type=text class=search_input ng-model=adminTzfwUsers.search ng-model-options="{ debounce: 1000 }" placeholder=请输入部门或名字> </div> <div class=list> <div ng-repeat="dep in adminTzfwUsers.peoplelist|filter:adminTzfwUsers.search track by $index"> <label class="list-item celled flex lh50"> <p>{{dep[0]}}: <span ng-bind-html=dep[1]|parsetohtml></span></p> <input type=checkbox class=radio value={{dep}} ng-model=dep.selected ng-change=adminTzfwUsers.handleUser(dep)> </label> </div> </div> </div> <div class=footer> <div class=btn ng-click=adminTzfwUsers.confirm()> 确定</div> </div>
