<div class=header> <back-btn></back-btn> 采购物资 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required"> <div class=item-label>物资类型</div> <div class=flow-content style=padding-right:30px> <select ng-model=param.materialType ng-options="item.value as item.key for item in WZTypeList" ng-change=getusers()> <option>选择物资类型</option> </select> </div> </div> <div class="list-item icon_more required"> <div class=item-label>是否入库</div> <div class=flow-content style=padding-right:30px> <select ng-model=param.needEntry ng-options="item.value as item.key for item in needEntryTypes"> <option>选择是否入库</option> </select> </div> </div> <div class="list-item icon_more" ng-show="param.needEntry==1"> <div class=item-label>是否更新单价</div> <div class=flow-content style=padding-right:30px> <select ng-model=param.updatePrice ng-options="item.value as item.key for item in updatePriceTypes"> <option>是否更新单价</option> </select> </div> </div> <label class="list-item list-item-textarea"> <p class=item-label>备注</p> <p class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </p> </label> <div class="list table-list"> <div class=info-title>采购明细 <span class="c-blue fr" ng-click=showWZ()>添加</span> </div> <div class=table-item ng-repeat="item in param.details" ng-class={mt0:$first}> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>物资名称</div> <div class=flow-content> {{ item.materialName || item.mname }} </div> </div> <div class=list-item> <div class=item-label>单位</div> <div class=flow-content>{{ item.unit }}</div> </div> <div class=list-item ng-show=item.specifications> <div class=item-label>规格型号</div> <div class=flow-content>{{ item.specifications }}</div> </div> <div class=list-item> <div class=item-label>单价(元)</div> <div class=flow-content>{{ item.unitPrice|NBFmt }}</div> </div> <div class=list-item> <div class=item-label>数量</div> <div class=flow-content>{{ item.totalNum }}</div> </div> <div class=list-item> <div class=item-label>需要归还</div> <div class=flow-content> {{ item.needToReturn==1?"是":"否" }} </div> </div> <div class=list-item> <div class=item-label>备注</div> <div class=flow-content> {{ item.useage }} </div> </div> </div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div>  <div delete-flow uid=param.uid id="{{ param.processInstanceId }}" submit=submit validate=validate></div> </div> <div class="list tablestyle pickceritem" ng-show=showCerPicker> <div class=list-item> <div class="list-item list-content required icon_enter"> <div class=col-1-4>名称</div> <div class=col-3-4 style="margin-right: 4%;"> <input type=text ng-model=picker.mname> <p class=project_name ng-click=choosewz() style=top:0></p> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>单位</div> <div class=col-3-4> <input type=text ng-model=picker.unit> </div> </div> <div class="list-item list-content"> <div class=col-1-4>规格/型号</div> <div class=col-3-4> <input type=text ng-model=picker.specifications> </div> </div> <div class="list-item list-content"> <div class=col-1-4>单价(元)</div> <div class=col-3-4> <input type=text ng-model=picker.unitPrice tel-directive> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>数量</div> <div class=col-3-4> <input type=text ng-model=picker.totalNum tel-directive> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>需要归还</div> <div class=col-3-4> <select ng-model=picker.needToReturn ng-options="item.value as item.key for item in needToReturnTypes"> <option>是否需要归还</option> </select> </div> </div> <div class="list-item list-content"> <div class=col-1-4>备注</div> <div class=col-3-4> <input type=text ng-model=picker.useage> </div> </div> </div> <div class="pickceritem-btn tc flex"> <div class=cancel ng-click=cacelWZPicker()>取消</div> <div class=confirm ng-click=addWZPicker()>确定</div> </div> </div>
