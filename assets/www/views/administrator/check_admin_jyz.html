<div class=header> <back-btn></back-btn> 借印章</div> <div class="container finance task-review"> <div class="list f_sk"> <div user-info no=TaskReview.result.fileNo depname=TaskReview.result.departmentName date=TaskReview.result.applyDate username=TaskReview.result.userName></div> <div class=section> <div class="list-item flex"> <div class=label>借印事由</div> <div class=w60>{{TaskReview.result.borrowReason}}</div> </div> <div class="list-item flex"> <div class=label>预计归还日期</div> <div class=w60> {{TaskReview.result.returnDate|dateFmt}} </div> </div> <div class="list-item flex"> <div class=label>模块编号</div> <div class=w60 relative-module={{TaskReview.result.relatedModule}} module-no={{TaskReview.result.moduleNo}}> {{TaskReview.result.moduleNo}}</div> </div> <div class="list-item flex"> <div class=label>备注</div> <div class=w60>{{TaskReview.result.remark}}</div> </div> <div class="list table-list"> <div class=info-title ng-show=TaskReview.result.detailList.length>借印章明细</div> <div class=table-item ng-repeat="item in TaskReview.result.detailList"> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content>{{item.fileNo}}</div> </div> <div class=list-item> <div class=item-label>印章类别</div> <div class=flow-content>{{item.sealType}}</div> </div> <div class=list-item> <div class=item-label>印章字样</div> <div class=flow-content>{{item.sealText}}</div> </div> </div> </div>  <div checkuser-define field-map=TaskReview.result.customFields></div>  <div class=file-upload file-list checked=true file-data=TaskReview.result.attachment> </div> </div>  <div log-list status=processStatus taskid=process_id></div> <div class="lh40 flex expressNo" ng-show=showaudit> <div class="c9 w30">快递单号</div> <div class=w70> <input type=text ng-model=expressNo placeholder=请输入快递单号> </div> </div> </div> </div>
