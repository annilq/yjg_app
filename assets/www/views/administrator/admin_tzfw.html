<div class=header> <back-btn></back-btn> 通知发文 <div class=right-btn ng-click=submitSK()> 提交 </div> </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required" ng-click=showType()> <div class=item-label>类别:</div> <label class=flow-content> <select ng-model=param.docType ng-options="item.value as item.key for item in typeList"> <option>请选择</option> </select> </label> </div> <div class="list-item required"> <div class=item-label>标题:</div> <div class=flow-content> <input type=text ng-model=param.docName> </div> </div> <div class="list-item icon_more required"> <div class=item-label>缓急等级:</div> <label class=flow-content> <select ng-model=param.hurryLevel ng-options="item.value as item.key for item in hurryLevelList"> <option>请选择</option> </select> </label> </div> <div class="list-item required"> <div class=item-label>秘密等级:</div> <label class=flow-content> <select ng-model=param.secretLevel ng-options="item.value as item.key for item in secretLevelList"> <option>请选择</option> </select> </label> </div> <div rela-module taskid=process_id param=param rel=TZFW_MODULE></div> <div class="list-item list-item-textarea"> <div class=item-label>备注:</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div> <div class="list-item required icon_more" ng-click=chooseUsers()> <div class=item-label>查看对象</div> <ul class=flow-content> <li ng-repeat="item in users"> <div class=pic> {{item[0]+":"+item[1]}} </div> </li> </ul> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.docUrl> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
