<div class=header> <back-btn></back-btn> 借印章 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item list-item-textarea required"> <div class=item-label>借印事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.borrowReason></textarea> </div> </div> <label class="list-item icon_more required"> <p class=item-label>预计归还日期</p> <p class=flow-content> <input type=text date-directive ng-model=param.returnDate> </p> </label> <div rela-module taskid=process_id param=param rel=YYSQ_MODULE></div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div> <div class="list-item icon_more required" ng-click=getChoosecertId()> <div class=item-label>借印章明细</div> <div class=flow-content>{{param.detailList.length}}</div> </div> <div class="list table-list"> <div class=info-title ng-show=param.detailList.length>已选择印章</div> <div class=table-item ng-repeat="item in param.detailList"> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>印章类别</div> <div class=flow-content>{{item.sealType}}</div> </div> <div class=list-item> <div class=item-label>印章字样</div> <div class=flow-content>{{item.sealText}}</div> </div> </div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
