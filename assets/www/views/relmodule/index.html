<div class=header> <back-btn cleancache=no fn=goback></back-btn> 关联模块 </div> <div class="container pagetablestyle"> <div class=rel-tab> <div class=rel-list style=width:{{emWidth}};min-width:100%> <div class=rel-item ng-click=onClickTab(item) ng-class={active:isActiveTab(item)} ng-repeat="item in tabList">{{item.name}}</div> </div> </div> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container='".pagetablestyle"'> <div class=table-item ng-repeat="item in taskList.items track by $index"> <div class=list-item ng-repeat="relobj in attrObj track by $index"> <div class=item-label>{{relobj.key}}</div> <div class=flow-content ng-switch=relobj.extend> <span ng-switch-when=href> <span class=w60 relative-module={{formKey}} module-no={{item[relobj.value]}}> {{item[relobj.value]}}</span> </span> <span ng-switch-when=depositType> <span ng-switch=item[relobj.value]> <span ng-switch-when=1> 汇投标保证金 </span> <span ng-switch-when=2> 汇履约保证金 </span> <span ng-switch-when=3> 退投标保证金 </span> <span ng-switch-when=4> 退履约保证金 </span> </span> </span> <span ng-switch-when=image> <span ng-switch=item[relobj.value]> <img src=images/erase.png ng-switch-when=0 style=vertical-align:middle> <img src=images/apply.png ng-switch-when=1 style=vertical-align:middle> </span> </span> <span ng-switch-default> <span ng-switch=relobj.format> <span ng-switch-when=date> {{item[relobj.value]|dateFmt}} </span> <span ng-switch-when=double> {{item[relobj.value]|NBFmt}} </span> <span ng-switch-default> {{item[relobj.value]}} </span> </span> </span> </div> </div> </div> <div class="noData tc" ng-show=!taskList.items.length>{{taskList.tip}}</div> </div> </div>
