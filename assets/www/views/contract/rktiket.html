<div class=header> <back-btn></back-btn> 入库单 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required" ng-click=choosePeople()> <div class=item-label>工程名称</div> <div class=flow-content> {{param.projectName}} </div> </div> <div class="list-item icon_more"> <div class=item-label>通用合同编号</div> <div class=flow-content> <input type=text ng-model=param.commonContractNo> <p class=project_name ng-click=chooseContract()></p> </div> </div> <div class="list-item required"> <div class=item-label>供应商</div> <div class=flow-content> <input type=text ng-model=param.supplier> </div> </div> <div class="list-item required"> <div class=item-label>所入仓库</div> <div class=flow-content> <input type=text ng-model=param.godown> </div> </div> <div class="list-item required"> <div class=item-label>库管员</div> <div class=flow-content> <input type=text ng-model=param.keeper> </div> </div> <div class="list-item required"> <div class=item-label>签收人</div> <div class=flow-content> <input type=text ng-model=param.receiver> </div> </div> <div class="list-item icon_more"> <div class=item-label>签收时间</div> <div class=flow-content> <input type=text ng-model=param.receiveDate date-directive datetype=datetime> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark placeholder=内容字数不能大于500 maxlength=500></textarea> </div> </div> <div class="list table-list"> <div class=info-title> 入库物料明细 <span class="c-blue fr" ng-click=showCertificate() ng-show="param.details.length<1">添加</span> </div> <div class=table-item ng-repeat="item in param.details"> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>名称</div> <div class=flow-content>{{item.name}}</div> </div> <div class=list-item> <div class=item-label>规格/型号</div> <div class=flow-content>{{item.type}}</div> </div> <div class=list-item> <div class=item-label>单价(元)</div> <div class=flow-content>{{item.price}}</div> </div> <div class=list-item> <div class=item-label>数量</div> <div class=flow-content>{{item.quantity}}</div> </div> <div class=list-item> <div class=item-label>总价(元)</div> <div class=flow-content>{{item.amount}}</div> </div> <div class=list-item> <div class=item-label>备注</div> <div class=flow-content>{{item.remark_}}</div> </div> <span class="list-item c-blue tc" ng-click=showCertificate() ng-show="param.details.length-1==$index">添加</span> </div> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=list-item file-upload file-data=param.attachment></div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>  <div class="list tablestyle pickceritem" ng-show=showCerPicker> <div class=list-item> <div class="list-item list-content required"> <div class=col-1-4>名称</div> <div class=col-3-4> <input type=text ng-model=picker.name> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>规格/型号</div> <div class=col-3-4> <input type=text ng-model=picker.type> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>单价(元)</div> <div class=col-3-4> <input type=text ng-model=picker.price tel-directive> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>数量</div> <div class=col-3-4> <input type=tel ng-model=picker.quantity tel-directive positive> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>总价(元)</div> <div class=col-3-4> <input type=tel ng-model=picker.amount tel-directive> </div> </div> <div class="list-item list-content"> <div class=col-1-4>备注</div> <div class=col-3-4> <input type=text ng-model=picker.remark_> </div> </div> </div> <div class="pickceritem-btn tc flex"> <div class=cancel ng-click=cacelCertificate()>取消</div> <div class=confirm ng-click=addCertificate()>确定</div> </div> </div>
