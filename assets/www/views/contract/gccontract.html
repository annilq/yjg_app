<div class=header> <back-btn></back-btn> 工程合同 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item required icon_more"> <div class=item-label>工程名称</div> <div class=flow-content> <input type=text ng-model=param.projectName ng-disabled=disableInput> <p class=project_name ng-click=choosePeople()></p> </div> </div> <div class="list-item required"> <div class=item-label>建设单位</div> <div class=flow-content> <input type=text ng-model=param.developer> </div> </div> <div class="list-item icon_more"> <div class=item-label>合作伙伴</div> <div class=flow-content> <input type=text ng-model=param.customerName> <p class=project_name ng-click=chooseCustomer()></p> </div> </div> <div class="list-item icon_more required" ng-click=showprojectTypeObj()> <div class=item-label>工程类型</div> <label class=flow-content> <select ng-model=param.projectType ng-options="item.value as item.key for item in projectTypelist"> <option>请选择</option> </select> </label> </div> <div class="list-item required"> <div class=item-label>合同金额(元)</div> <div class=flow-content> <input type=text ng-model=param.contractAmount tel-directive> </div> </div> <div class="list-item required"> <div class=item-label>建造师</div> <div class=flow-content> <input type=text ng-model=param.projectManager> </div> </div> <div class="list-item icon_more required"> <div class=item-label>合同签订日期</div> <label class=flow-content> <input type=text date-directive ng-model=param.dateOfSigning> </label> </div> <div class="list-item icon_more required"> <div class=item-label>计划开工日期</div> <label class=flow-content> <input type=text date-directive ng-model=param.startWorkingDate> </label> </div> <div class="list-item icon_more required"> <div class=item-label>计划竣工日期</div> <label class=flow-content> <input type=text date-directive ng-model=param.endWorkingDate> </label> </div> <div class="list-item list-item-textarea"> <div class=item-label>主要条款</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.mainClause></textarea> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.projectProfile></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=list-item file-upload file-data=param.attachmentName required=true> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
