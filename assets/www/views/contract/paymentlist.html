<div class=header> <back-btn cleancache=no></back-btn> 合同支付工程款 </div> <div class="container finacetablestyle"> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container="'.finacetablestyle'"> <div class=table-item ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>付款编号</div> <div class=flow-content relative-module=Xm_ProjectPayment module-no="{{ item.fileNo }}"> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>工程款大类 </div> <div class=flow-content>{{ item.payType1 }}</div> </div> <div class=list-item> <div class=item-label>工程款小类 </div> <div class=flow-content>{{ item.payType2 }}</div> </div> <div class=list-item> <div class=item-label>支付日期 </div> <div class=flow-content>{{ item.endDate | dateFmt }}</div> </div> <div class=list-item> <div class=item-label>收款人</div> <div class=flow-content>{{ item.acceptPerson }}</div> </div> <div class=list-item> <div class=item-label>付款金额 </div> <div class=flow-content>{{ item.acceptAmount | NBFmt }}</div> </div> <div class=list-item> <div class=item-label>付款事由 </div> <div class=flow-content>{{ item.payRemark }}</div> </div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
