<div class=header> <back-btn cleancache=no></back-btn> 付款记录 </div> <div class="container finacetablestyle"> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container="'.finacetablestyle'"> <div class=table-item ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content relative-module=project_payment module-no="{{ item.fileNo }}"> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>申请人</div> <div class=flow-content>{{ item.userName }}</div> </div> <div class=list-item> <div class=item-label>申请日期</div> <div class=flow-content>{{ item.applyDate|dateFmt }}</div> </div> <div class=list-item> <div class=item-label>支出总金额</div> <div class=flow-content>{{ item.totalAmount | NBFmt }}</div> </div> <div class=list-item> <div class=item-label>扣款金额小计</div> <div class=flow-content>{{ item.deductAmount | NBFmt }}</div> </div> <div class=list-item> <div class=item-label>付款金额小计</div> <div class=flow-content>{{ item.payAmount | NBFmt }}</div> </div> <div class=list-item> <div class=item-label>支付状态</div> <div class=flow-content ng-switch=item.completion> <span ng-switch-when=0>未支付</span> <span ng-switch-when=1>已支付</span> </div> </div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
