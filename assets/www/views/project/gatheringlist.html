<div class=header> <back-btn cleancache=no></back-btn> 收款记录 </div> <div class="container finacetablestyle"> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container="'.finacetablestyle'"> <div class=table-item ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content relative-module=project_gathering module-no="{{ item.fileNo }}"> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>交款人</div> <div class=flow-content>{{ item.payer }}</div> </div> <div class=list-item> <div class=item-label>交款日期</div> <div class=flow-content>{{ item.receiveDate }}</div> </div> <div class=list-item> <div class=item-label>款项类别</div> <div class=flow-content ng-switch=item.receiveType> <span ng-switch-when=1>工程款</span> <span ng-switch-when=2>垫付款</span> <span ng-switch-when=8>预借款</span> <span ng-switch-when=9>清账款</span> <span ng-switch-when=10>已付款</span> </div> </div> <div class=list-item ng-show=item.receiveSubType> <div class=item-label>款项用途</div> <div class=flow-content>{{ item.receiveSubType }}</div> </div> <div class=list-item> <div class=item-label>收款金额</div> <div class=flow-content>{{ item.amount | NBFmt }}</div> </div> <div class=list-item> <div class=item-label>入账状态</div> <div class=flow-content ng-switch=item.completion> <span ng-switch-when=0>未入账</span> <span ng-switch-when=1>已入账</span> </div> </div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
