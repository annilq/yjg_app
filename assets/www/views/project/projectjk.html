<div class=header> <back-btn></back-btn> 项目借款 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required" ng-click=chooseProject()> <div class=item-label>项目名称</div> <div class=flow-content>{{ param.projectName }}</div> </div> <div class="list-item icon_more" ng-click=chooseSk()> <div class=item-label>项目收款</div> <div class=flow-content>{{ param.gatheringNo }}</div> </div> <div class="list-item icon_more required"> <div class=item-label>款项用途</div> <div class=flow-content style=padding-right:0> <select ng-model=param.borrowPurpose ng-options="item.value as item.key for item in borrowPurposeList"> <option>选择款项用途</option> </select> </div> </div> <div class="list-item required"> <div class=item-label>借款金额</div> <div class=flow-content> <input type=text ng-model=param.borrowingAmount tel-directive> </div> </div> <div class="list-item icon_more"> <div class=item-label>收款人</div> <div class=flow-content> <input type=text ng-model=param.receivePerson> <p class=project_name ng-click=showSearchPicker()></p> </div> </div> <div class=list-item> <div class=item-label>收款人账号</div> <div class=flow-content> <input type=text ng-model=param.receiveAccount> </div> </div> <div class=list-item> <div class=item-label>收款人开户行</div> <div class=flow-content> <input type=text ng-model=param.receiveBank> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>借款事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.borrowReason></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment></div>  <div log-list taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id="{{ param.processInstanceId }}" submit=submit validate=validate></div> <div search-input show-search-input=showSearchInput apiurl=apiurl handle-search=handleSearch param=searchparam title=searchtitle></div>
