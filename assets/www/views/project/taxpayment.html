<div class=header> <back-btn></back-btn> 缴费记录 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required" ng-click=chooseProject()> <div class=item-label>项目名称</div> <div class=flow-content>{{ param.projectName }}</div> </div> <div class="list-item required"> <div class=item-label>税务机关</div> <div class=flow-content> <input type=text ng-model=param.taxAuthority> </div> </div> <div class="list-item required"> <div class=item-label>税票数量</div> <div class=flow-content> <input type=text tel-directive ng-model=param.receiptQuantity> </div> </div> <div class="list-item required"> <div class=item-label>税款所属时期(开始)</div> <div class=flow-content> <input type=text date-directive ng-model=param.taxStartDate class=c0> </div> </div> <div class="list-item required"> <div class=item-label>税款所属时期(截止)</div> <div class=flow-content> <input type=text date-directive ng-model=param.taxEndDate class=c0> </div> </div> <div class=list-item> <div class=item-label>销售金额</div> <div class=flow-content> <input type=text tel-directive ng-model=param.salesAmount> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div> <div class="list table-list"> <div class=info-title> 税额明细 <span class="c-blue fr" ng-click=showCertificate()>添加</span> </div> <div class=table-item ng-repeat="item in param.details"> <div class=content ng-class="{cur:$index==costindex}" ng-click=resetlist(0) ng-swipe-left=swipe($index,0) ng-swipe-right=swipe(-1,0)> <div class=list-item> <div class=item-label>税种</div> <div class=flow-content> {{ item.type }} </div> </div> <div class=list-item> <div class=item-label>税率(%)</div> <div class=flow-content>{{ item.rate }}</div> </div> <div class=list-item> <div class=item-label>税额</div> <div class=flow-content>{{ item.amount|NBFmt }}</div> </div> </div> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> </div> </div>  <div class=file-upload file-upload file-data=param.attachment></div>  <div log-list taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id="{{ param.processInstanceId }}" submit=submit validate=validate></div>  <div class="list tablestyle pickceritem" ng-show=showCerPicker> <div class="list-item f_sk"> <div class="grid list-content icon_enter required"> <div class=col-1-4>税种</div> <div class=col-3-4> <select ng-model=picker.type ng-options="item.value as item.key for item in typeList"> <option>请选择</option> </select> </div> </div> <div class="grid list-content icon_enter"> <div class=col-1-4>税率</div> <div class=col-3-4> <input type=text ng-model=picker.rate tel-directive> </div> </div> <div class="grid list-content required"> <div class=col-1-4>税额</div> <div class=col-3-4> <input type=text tel-directive ng-model=picker.amount> </div> </div> </div> <div class="pickceritem-btn tc flex"> <div class=cancel ng-click=closePicker()>取消</div> <div class=confirm ng-click=addCertificate()>确定</div> </div> </div>
