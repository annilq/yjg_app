<div class=header> <back-btn cleancache=no></back-btn> 合同记录 </div> <div class="container finacetablestyle"> <div class=search_input_wrapper> <input type=text class=search_input ng-model=input ng-change=search(input) ng-model-options="{ debounce: 1000 }" placeholder=请输入合同名称> </div> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container="'.finacetablestyle'"> <div class=table-item ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content relative-module={{item.contractType}} module-no="{{ item.fileNo }}"> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>申请人</div> <div class=flow-content>{{ item.userName }}</div> </div> <div class=list-item> <div class=item-label>申请日期</div> <div class=flow-content>{{ item.applyDate | dateFmt }}</div> </div> <div class=list-item> <div class=item-label>合同名称</div> <div class=flow-content> {{ item.contractName }} </div> </div> <div class=list-item> <div class=item-label>合同金额</div> <div class=flow-content> {{ item.contractAmount | NBFmt }} </div> </div> <div class=list-item> <div class=item-label>已付款金额</div> <div class=flow-content> {{ item.paidAmount | NBFmt }} </div> </div> <div class=list-item> <div class=item-label>合同状态</div> <div class=flow-content ng-switch=item.status> <span ng-switch-when=0>未生效 </span> <span ng-switch-when=1>已生效</span> <span ng-switch-when=2>已归档</span> <span ng-switch-when=3>已作废</span> </div> </div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
