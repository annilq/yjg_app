<div class=header> <back-btn></back-btn> 项目收款 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item required"> <div class=item-label>交款人</div> <div class=flow-content> <input type=text ng-model=param.payer> </div> </div> <label class="list-item icon_clock required"> <p class=item-label>交款日期</p> <p class=flow-content> <input type=text date-directive id=start_date ng-model=param.receiveDate class=c0> </p> </label> <div class="list-item icon_more required" ng-click=chooseProject()> <div class=item-label>项目名称</div> <div class=flow-content>{{ param.projectName }}</div> </div> <div class="list-item icon_more required"> <div class=item-label>收款账户</div> <div class=flow-content style=padding-right:0> <select ng-model=param.targetAccount> <option></option> <option value=1>项目账户</option> <option value=2>农民工工资专用账户</option> </select> </div> </div> <div class="list-item icon_more required"> <div class=item-label>款项类别</div> <div class=flow-content style=padding-right:0> <select ng-model=param.receiveType ng-options="item.value as item.key for item in costTypeList" ng-change=costTypechange()> <option>选择款项类别</option> </select> </div> </div> <div class="list-item icon_more" ng-show="param.receiveType==1" ng-click=chooseInvoice()> <div class=item-label>销项发票</div> <div class=flow-content> {{ param.outputInvoiceNo }} </div> </div> <div class="list-item icon_more"> <div class=item-label>款项用途</div> <div class=flow-content style=padding-right:0> <select ng-model=param.receiveSubType ng-options="item.value as item.key for item in receiveSubTypeList"> <option>选择款项用途</option> </select> </div> </div> <div class="list-item required"> <div class=item-label>收款金额</div> <div class=flow-content> <input type=text ng-model=param.amount tel-directive> </div> </div> <div class=list-item ng-show="param.receiveType==1"> <div class=item-label>农民工工资保证金</div> <div class=flow-content> <input type=text ng-model=param.peasantWorkerDeposit tel-directive> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>收款事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.receiveReason></textarea> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div>  <div user-defined field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div> <div class=table-list> <div class=info-title>款项来源人</div> <div class=table-item> <div class=list-item> <div class=item-label>来源人:</div> <div class=flow-content> <input type=text ng-model=param.payPerson> </div> </div> <div class=list-item> <div class=item-label>来源账户:</div> <div class=flow-content> <input type=text ng-model=param.payAccount> </div> </div> <div class=list-item> <div class=item-label>开户行:</div> <div class=flow-content> <input type=text ng-model=param.payBank> </div> </div> </div> </div> <div class=table-list> <div class=info-title>收款人</div> <div class=table-item> <div class=list-item> <div class=item-label>收款人:</div> <div class=flow-content> <input type=text ng-model=param.receivePerson> </div> </div> <div class=list-item> <div class=item-label>收款账号:</div> <div class=flow-content> <input ng-model=param.receiveAccount> </div> </div> <div class=list-item> <div class=item-label>开户行:</div> <div class=flow-content> <input type=text ng-model=param.receiveBank> </div> </div> </div> </div>  <div class=file-upload file-upload file-data=param.attachment></div>  <div log-list taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id="{{ param.processInstanceId }}" submit=submit validate=validate></div>
