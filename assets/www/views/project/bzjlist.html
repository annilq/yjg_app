<div class=header> <back-btn cleancache=no></back-btn> 保证金记录 </div> <div class="container finacetablestyle"> <div class=search_input_wrapper> <input type=text class=search_input ng-model=input ng-change=search(input) ng-model-options="{ debounce: 1000 }" placeholder=申请人> </div> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container="'.finacetablestyle'"> <div class=table-item ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>保证金编号</div> <div class=flow-content relative-module=Xm_ProjectDeposit module-no="{{ item.fileNo }}"> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>申请人</div> <div class=flow-content>{{ item.userName }}</div> </div> <div class=list-item> <div class=item-label>申请日期</div> <div class=flow-content>{{ item.applyDate | dateFmt }}</div> </div> <div class=list-item> <div class=item-label>保证金类型 </div> <div class=flow-content ng-switch=item.depositType> <span ng-switch-when=1>履约保证金 </span> <span ng-switch-when=2>工程质量保证金</span> <span ng-switch-when=3>农民工工资保证金 </span> <span ng-switch-when=4>其他保证金</span> </div> </div> <div class=list-item> <div class=item-label>款项类型 </div> <div class=flow-content ng-switch=item.actionType> <span ng-switch-when=1>汇出保证金 </span> <span ng-switch-when=2>退回保证金</span> </div> </div> <div class=list-item> <div class=item-label>款项来源 </div> <div class=flow-content ng-switch=item.sourceType> <span ng-switch-when=1>项目账户余额 </span> <span ng-switch-when=2>其他来源</span> </div> </div> <div class=list-item> <div class=item-label>保证金金额 </div> <div class=flow-content> {{ item.amount | NBFmt }} </div> </div> <div class=list-item> <div class=item-label>已支付 </div> <div class=flow-content ng-switch=item.completion> <span ng-switch-when=0>未支付 </span> <span ng-switch-when=1>已支付</span> </div> </div> <div class=list-item> <div class=item-label>审批状态 </div> <div class=flow-content> {{item.processStatus}} </div> </div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
