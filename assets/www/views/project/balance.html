<div class=header> <back-btn></back-btn> 项目清账 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required" ng-click=chooseProject()> <div class=item-label>项目名称</div> <div class=flow-content>{{ param.projectName }}</div> </div> <div class="list-item icon_more" ng-click=chooseinfo()> <div class=item-label>模块编号</div> <div class=flow-content ng-class={cd9:!param.moduleNo}> {{ param.moduleNo || "点击选择" }} </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div>  <div user-defined field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div> <div class="list table-list"> <div class=info-title> 清账明细 <span class="c-blue fr" ng-click=showbalancelist()>加载</span> </div>  <div class=table-item ng-repeat="item in param.details"> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>扣款编号 </div> <div class=flow-content>{{ item.costNo }}</div> </div> <div class=list-item> <div class=item-label>款项类别 </div> <div class=flow-content>{{ item.costType|getnamefromvalue }}</div> </div> <div class=list-item> <div class=item-label>款项小类 </div> <div class=flow-content>{{ item.costSubType }}</div> </div> <div class=list-item> <div class=item-label>清账金额 </div> <div class=flow-content>{{ item.costAmount|NBFmt }}</div> </div> </div> <div class="delete_icon icon_del" ng-click=deleteItem($index)></div> </div> </div>  <div log-list taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id="{{ param.processInstanceId }}" submit=submit validate=validate></div>
