<div class=header> <back-btn cleancache=no></back-btn> 报销记录 </div> <div class="container finacetablestyle"> <div class=search_input_wrapper> <input type=text class=search_input ng-model=input ng-change=search(input) ng-model-options="{ debounce: 1000 }" placeholder=申请人> </div> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container="'.finacetablestyle'"> <div class=table-item ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>报销编号</div> <div class=flow-content relative-module=Xm_ProjectReimburse module-no="{{ item.fileNo }}"> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>申请人</div> <div class=flow-content>{{ item.userName }}</div> </div> <div class=list-item> <div class=item-label>申请日期</div> <div class=flow-content>{{ item.applyDate | dateFmt }}</div> </div> <div class=list-item> <div class=item-label>报销总金额 </div> <div class=flow-content> {{ item.reimburseAmount | NBFmt }} </div> </div> <div class=list-item> <div class=item-label>借款冲抵金额 </div> <div class=flow-content> {{ item.againstAmount | NBFmt }} </div> </div> <div class=list-item> <div class=item-label>实际需付金额 </div> <div class=flow-content> {{ item.paymentAmount | NBFmt }} </div> </div> <div class=list-item> <div class=item-label>报销状态 </div> <div class=flow-content ng-switch=item.completion> <span ng-switch-when=0>未报销 </span> <span ng-switch-when=1>已报销</span> </div> </div> <div class=list-item> <div class=item-label>审批状态 </div> <div class=flow-content> {{item.processStatus}} </div> </div> <div class=list-item> <div class=item-label>备注</div> <div class=flow-content> {{ item.remark }} </div> </div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
