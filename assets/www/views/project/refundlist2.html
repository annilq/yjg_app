<div class=header> <back-btn cleancache=no></back-btn> 退回记录 </div> <div class="container finacetablestyle"> <div class="list table-list f_sk"> <div class=table-item ng-repeat="item in data"> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content relative-module=project_refund module-no="{{ item.fileNo }}"> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>申请人</div> <div class=flow-content>{{ item.userName }}</div> </div> <div class=list-item> <div class=item-label>申请日期</div> <div class=flow-content>{{ item.applyDate | dateFmt }}</div> </div> <div class=list-item> <div class=item-label>退回到</div> <div class=flow-content ng-switch=item.refundTarget> <span ng-switch-when=1>款项来源人</span> <span ng-switch-when=2>项目余额</span> </div> </div> <div class=list-item> <div class=item-label>收款人</div> <div class=flow-content>{{ item.receivePerson }}</div> </div> <div class=list-item> <div class=item-label>款项类别</div> <div class=flow-content ng-switch=item.refundType> <span ng-switch-when=1>工程款</span> <span ng-switch-when=2>垫付款</span> <span ng-switch-when=3>保证金</span> <span ng-switch-when=4>押金</span> <span ng-switch-when=5>缴纳</span> <span ng-switch-when=6>成本</span> <span ng-switch-when=7>收入</span> <sapn ng-switch-when=8>预借款</sapn> <sapn ng-switch-when=9>清账款</sapn> <sapn ng-switch-when=10>已付款</sapn> </div> </div> <div class=list-item> <div class=item-label>退款金额</div> <div class=flow-content>{{ item.amount | NBFmt }}</div> </div> <div class=list-item> <div class=item-label>退回状态</div> <div class=flow-content ng-switch=item.completion> <span ng-switch-when=0>未退回 </span> <span ng-switch-when=1>已退回</span> </div> </div> </div> <div ng-show=!data.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
