<div class=header> <back-btn cleancache=no></back-btn> 扣款记录 </div> <div class="container finacetablestyle"> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container="'.finacetablestyle'"> <div class=table-item ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content relative-module=project_cost module-no="{{ item.fileNo }}"> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>申请人</div> <div class=flow-content>{{ item.userName }}</div> </div> <div class=list-item> <div class=item-label>申请日期</div> <div class=flow-content>{{ item.applyDate | dateFmt }}</div> </div> <div class=list-item> <div class=item-label>扣款类型</div> <div class=flow-content ng-switch=item.closeOutType> <span ng-switch-when=1>正常扣款</span> <span ng-switch-when=2>预先扣款</span> <span ng-switch-when=3>收款转扣款</span> </div> </div> <div class=list-item> <div class=item-label>扣款总金额</div> <div class=flow-content>{{ item.amount | NBFmt }}</div> </div> <div class=list-item> <div class=item-label>扣款状态</div> <div class=flow-content ng-switch=item.completion> <span ng-switch-when=0>未扣</span> <span ng-switch-when=1>已扣</span> </div> </div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
