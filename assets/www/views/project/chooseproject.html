<div class=header> <back-btn cleancache=no></back-btn> 项目列表 </div> <div class="container finacetablestyle"> <div class=search_input_wrapper> <input type=text class=search_input ng-model=projectName ng-model-options="{ debounce: 1000 }" ng-change=search(projectName) placeholder=搜索> </div> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container='".finacetablestyle"'> <div class=table-item ng-click=choosePeople($index) ng-class="{'selected':item.selected}" ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>项目编号</div> <div class=flow-content> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>项目名称</div> <div class=flow-content> {{ item.projectName }} </div> </div> <div class=list-item> <div class=item-label>负责人</div> <div class=flow-content> {{ item.chargePerson }} </div> </div> <div class=list-item> <div class=item-label>当前余额</div> <div class=flow-content> {{ item.canPay | NBFmt }} </div> </div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
