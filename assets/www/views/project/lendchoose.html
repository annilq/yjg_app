<div class=header> <back-btn cleancache=no></back-btn> 借款记录 </div> <div class="container finacetablestyle"> <div class=search_input_wrapper> <input type=text class=search_input ng-model=input ng-change=search(input) ng-model-options="{ debounce: 1000 }" placeholder=申请人> </div> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container="'.finacetablestyle'"> <div class=table-item ng-click=choosePeople($index) ng-class="{'selected':item.selected}" ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>借款编号</div> <div class=flow-content relative-module=Xm_ProjectBorrowing module-no="{{ item.fileNo }}"> {{ item.fileNo }} </div> </div> <div class=list-item> <div class=item-label>申请人</div> <div class=flow-content>{{ item.userName }}</div> </div> <div class=list-item> <div class=item-label>申请日期</div> <div class=flow-content>{{ item.applyDate | dateFmt }}</div> </div> <div class=list-item> <div class=item-label>款项用途 </div> <div class=flow-content> {{ item.borrowPurpose }} </div> </div> <div class=list-item> <div class=item-label>借款金额 </div> <div class=flow-content> {{ item.borrowingAmount | NBFmt }} </div> </div> <div class=list-item> <div class=item-label>已报销金额 </div> <div class=flow-content> {{ item.reimbursedAmount | NBFmt }} </div> </div> <div class=list-masker></div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div> <div class="flex footer tc" ng-show=selectLists.length ng-click=submit()> <div class="b-btn w50">确定</div> </div>
