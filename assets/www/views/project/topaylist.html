<div class=header> <back-btn cleancache=no></back-btn> 待清记录 </div> <div class="container finacetablestyle"> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container="'.finacetablestyle'"> <div class=table-item ng-repeat="item in taskList.items"> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content relative-module=project_cost module-no="{{ item.refNo }}"> {{ item.refNo }} </div> </div> <div class=list-item> <div class=item-label>款项类别</div> <div class=flow-content ng-switch=item.deductType> <span ng-switch-when=3>保证金</span> <span ng-switch-when=4>押金</span> <span ng-switch-when=5>缴纳</span> <span ng-switch-when=6>成本</span> <span ng-switch-when=7>收入</span> <sapn ng-switch-when=10>已付款</sapn> </div> </div> <div class=list-item> <div class=item-label>款项小类</div> <div class=flow-content>{{ item.deductName }}</div> </div> <div class=list-item> <div class=item-label>扣款金额</div> <div class=flow-content>{{ item.deductAmount | NBFmt }}</div> </div> <div class=list-item> <div class=item-label>扣款事由</div> <div class=flow-content> {{ item.deductRemark }} </div> </div> </div> <div ng-show=!taskList.items.length class="noData tc"> {{ taskList.tip }} </div> </div> </div>
