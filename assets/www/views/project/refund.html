<div class=header> <back-btn></back-btn> 项目退款 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required" ng-click=chooseProject()> <div class=item-label>项目名称</div> <div class=flow-content>{{ param.projectName }}</div> </div> <div class="list-item icon_more" ng-click=chooseSk()> <div class=item-label>项目收款</div> <div class=flow-content>{{ param.gatheringNo }}</div> </div> <div class="list-item icon_more required"> <div class=item-label>退回到</div> <div class=flow-content style=padding-right:0> <select ng-model=param.refundTarget ng-options="item.value as item.key for item in costSourceType" ng-change=costTypechange()> <option>退回到</option> </select> </div> </div> <div class="list-item icon_more required"> <div class=item-label>款项类别</div> <div class=flow-content style=padding-right:0> <select ng-model=param.refundType ng-options="item.value as item.key for item in costTypeList"> <option>选择款项类别</option> </select> </div> </div> <div class="list-item required"> <div class=item-label>退款金额</div> <div class=flow-content> <input type=text ng-model=param.amount tel-directive> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>退款事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.refundReason></textarea> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div> <div class="list table-list"> <div class=info-title> 退款对应的关联记录 </div>  <div class=table-item ng-repeat="item in param.details"> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>编号</div> <div class=flow-content>{{ item.refundNo }}</div> </div> <div class=list-item> <div class=item-label>款项小类</div> <div class=flow-content> {{ item.refundSubType }} </div> </div> <div class=list-item> <div class=item-label>日期</div> <div class=flow-content>{{ item.refundDate }}</div> </div> <div class=list-item> <div class=item-label>金额</div> <div class=flow-content>{{ item.refundAmount | NBFmt }}</div> </div> <div class=list-item> <div class=item-label>事由</div> <div class=flow-content>{{ item.refundRemark }}</div> </div> </div> <div class="delete_icon icon_del" ng-click=deleteItem($index)></div> </div> </div>  <div user-defined field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div> <div class=table-list> <div class=info-title>款项来源人</div> <div class=table-item> <div class=list-item> <div class=item-label>来源人:</div> <div class=flow-content> <input type=text ng-model=param.payPerson> </div> </div> <div class=list-item> <div class=item-label>来源账户:</div> <div class=flow-content> <input type=text ng-model=param.payAccount> </div> </div> <div class=list-item> <div class=item-label>开户行:</div> <div class=flow-content> <input type=text ng-model=param.payBank> </div> </div> </div> </div> <div class=table-list> <div class=info-title>收款人</div> <div class=table-item> <div class=list-item> <div class=item-label>收款人:</div> <div class=flow-content> <input type=text ng-model=param.receivePerson> </div> </div> <div class=list-item> <div class=item-label>收款账号:</div> <div class=flow-content> <input ng-model=param.receiveAccount> </div> </div> <div class=list-item> <div class=item-label>开户行:</div> <div class=flow-content> <input type=text ng-model=param.receiveBank> </div> </div> </div> </div>  <div class=file-upload file-upload file-data=param.attachment></div>  <div log-list taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id="{{ param.processInstanceId }}" submit=submit validate=validate></div>
