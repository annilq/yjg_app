<div class=header> <back-btn></back-btn> 评论 </div> <div class="container f-bg"> <div class="list flow-comment"> <div class="list-item edit-content"> <textarea cols=30 rows=10 ng-model=flowcomment.data.content maxlength=1000 placeholder=请输入评论></textarea> </div>  <div class="file-upload f_sk" file-upload file-data=flowcomment.data.attachment hidelabel=true> </div> <div class="list-item mt10 lh40 celled"> <div class="comment-btn-wrapper flex"> <div class=c-blue ng-click=flowcomment.choosepeople()>@关注人</div> <div ng-click=flowcomment.addomment()> <p class="btn fr">完成</p> </div> </div> </div> <div class="joinpeople-list md mt10 cl celled" ng-show=flowcomment.data.followList.length> <div class="joinpeople-item tc" ng-repeat="item in flowcomment.data.followList track by item.id||item.userId"> <div class="item-avtar lh50"><img ng-src={{item.iconCls}} ng-if=item.iconCls>{{item.name||item.personName|username}}</div> <p class="fs12 name">{{item.name||item.personName}}</p> <p class=icon_del1 ng-click=flowcomment.delpersons($index)>del</p> </div> </div> </div> <div class="celled comment-menu lh35"> <div class="tab fs14 c9 active"> <p>评论</p> </div> </div> <div class=list> <div class="comment lh20 fs14"> <div class="list-item flex cl task-comment-update" ng-repeat="item in flowcomment.comments"> <div class=avtar> <div class="item-avtar sm lh30 fs12 tc"> <img ng-src={{item.portrait}} ng-if=item.portrait> {{item.personName|username}} </div> </div> <div class="comment-content celled"> <div class=flex> <p class="te w50 fw">{{item.personName }}</p> <p class="c9 fs12 tr w50">{{item.createDate}}</p> </div> <div class=fs12 ng-bind-html=item.content|parsetohtml></div>  <div class=mt10 file-list checked=true file-data=item.attachment> </div> </div> </div> </div> </div> </div>
