> </div> <div class=list-item> <div class=item-label>银行账号</div> <div class=flow-content> <input type=text ng-model=param.bankAccount> </div> </div> <div class=list-item> <div class=item-label>电话</div> <div class=flow-content> <input type=tel ng-model=param.phoneNo> </div> </div> <div class=list-item> <div class=item-label>地址</div> <div class=flow-content> <input type=text ng-model=param.address> </div> </div> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark placeholder=备注内容字数不能大于500></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
