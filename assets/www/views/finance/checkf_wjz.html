<div class=header> <back-btn></back-btn> 外经证 </div> <div class="container finance task-review"> <div class="list f_sk"> <div user-info no=TaskReview.result.no depname=TaskReview.result.department date=TaskReview.result.applyDate username=TaskReview.result.userName></div> <div class=section> <div class="list-item flex"> <div class=label>工程名称</div> <div class=w60 ng-switch=TaskReview.result.formKey> <div ng-switch-when=Project_ContractApplySingle relative-module={{TaskReview.result.formKey}} module-no={{TaskReview.result.contractNo}}> {{TaskReview.result.projectName}} </div> <div ng-switch-when=Xm_ProjectStore relative-module={{TaskReview.result.formKey}} module-no={{TaskReview.result.projectNo}}> {{TaskReview.result.projectName}} </div> </div> </div> <div class="list-item flex"> <div class=label>预计有效期至</div> <div class=w60> {{TaskReview.result.validityDate|dateFmt}} </div> </div> <div class="list-item flex"> <div class=label>开具金额</div> <div class=w60> {{TaskReview.result.money|NBFmt}} </div> </div> <div class="list-item flex"> <div class=label>开具金额(大写)</div> <div class=w60> {{TaskReview.result.amountInWorld}} </div> </div> <div class="list-item flex"> <div class=label>工程所在地税务部门报验需要的相关资料</div> <div class=w60> {{TaskReview.result.projectAddress}} </div> </div> <div class="list-item flex"> <div class=label>备注</div> <div class=w60>{{TaskReview.result.remark}}</div> </div>  <div checkuser-define field-map=TaskReview.result.customFields></div>  <div class=file-upload file-list checked=true file-data=TaskReview.result.attachment></div> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>
