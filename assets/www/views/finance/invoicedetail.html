<div class="list table-list" ng-show="details.length>0"> <div class=info-title>发票明细 </div> <div class=table-item ng-repeat="item in details"> <div class=list-item> <div class=item-label>发票编号 </div> <div class=flow-content>{{ item.invoiceNo }}</div> </div> <div class=list-item> <div class=item-label>开票日期 </div> <div class=flow-content>{{ item.openDate|dateFmt }}</div> </div> <div class=list-item> <div class=item-label>价税总计 </div> <div class=flow-content>{{ item.invoiceAmount| NBFmt}}</div> </div> <div class=list-item> <div class=item-label>发票税额 </div> <div class=flow-content>{{ item.invoiceTaxAmount|NBFmt }}</div> </div> <div class=list-item> <div class=item-label>发票金额 </div> <div class=flow-content>{{ (item.invoiceAmount-item.invoiceTaxAmount) |NBFmt }}</div> </div> <div class=list-item ng-show=item.invoiceRemark> <div class=item-label>备注</div> <div class=flow-content>{{ item.invoiceRemark }}</div> </div> <div class=file-upload file-list file-data=item.attachment_ checked=true></div> </div> </div>
