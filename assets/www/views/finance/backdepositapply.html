tem ng-hide="param.payType==3"> <div class=item-label>来款金额:</div> <div class=flow-content> {{item.money}} </div> </div> <div class=list-item> <div class=item-label>来源账户:</div> <div class=flow-content> {{item.account}} </div> </div> <div class=list-item> <div class=item-label>开户行:</div> <div class=flow-content> {{item.bank}}</div> </div> </div> </div> <div class=table-list ng-class={readonly:!disabled()}> <div class=info-title>收款人 </div> <div class=table-item> <div class=list-item> <div class=item-label>收款人:</div> <div class=flow-content><input ng-disabled=!disabled() type=text ng-model=param.receivePerson> </div> </div> <div class=list-item ng-hide="param.payType==1"> <div class=item-label>收款金额:</div> <div class=flow-content style=background:#fff><input type=text ng-model=param.receiveMoney tel-directive> </div> </div> <div class=list-item> <div class=item-label>收款账号:</div> <div class=flow-content> <input ng-disabled=!disabled() ng-model=param.receiveAccount> </div> </div> <div class=list-item> <div class=item-label>开户行:</div> <div class=flow-content> <input ng-disabled=!disabled() type=text ng-model=param.receiveBank> </div> </div> </div> <div class=table-item ng-repeat="item in param.receiveList"> <div class=list-item> <div class=item-label>收款人:</div> <div class=flow-content> {{item.person}}</div> </div> <div class=list-item> <div class=item-label>收款金额:</div> <div class=flow-content> {{item.money}}</div> </div> <div class=list-item> <div class=item-label>收款人账号:</div> <div class=flow-content>{{item.account}}</div> </div> <div class=list-item> <div class=item-label>收款人开户行:</div> <div class=flow-content> {{item.bank}}</div> </div> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>备注:</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
