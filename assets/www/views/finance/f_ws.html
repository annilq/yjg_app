<div class=header> <back-btn></back-btn> 完税凭证 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item required icon_more" ng-click=choosePeople()> <div class=item-label>工程名称</div> <div class=flow-content>{{param.projectName}}</div> </div> <div class="list-item required"> <div class=item-label>税票编号</div> <div class=flow-content> <input type=text ng-model=param.taxNo> </div> </div> <label class="list-item icon_more required"> <div class=item-label>填发日期</div> <div class=flow-content> <input type=text date-directive ng-model=param.openDate> </div> </label> <div class="list-item required"> <div class=item-label>税务机关</div> <div class=flow-content> <input type=text ng-model=param.taxingAuthority> </div> </div> <div class="list-item required"> <div class=item-label>销售金额(不含税)</div> <div class=flow-content><input type=text tel-directive ng-model=param.taxAmount></div> </div> <div class="list-item required icon_more" ng-click=showCertificate()> <div class=item-label>添加税额明细</div> <div class=flow-content></div> </div> <div class="list table-list"> <div class=info-title>税票编号</div> <div class=table-item ng-repeat="item in param.details"> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>税种</div> <div class=flow-content>{{item.type}}</div> </div> <div class=list-item> <div class=item-label>税率(%)</div> <div class=flow-content>{{item.rate}}</div> </div> <div class=list-item> <div class=item-label>税额(元)</div> <div class=flow-content>{{item.amount}}</div> </div> </div> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>  <div class="list tablestyle pickceritem" ng-show=showCerPicker> <div class=list-item> <div class="grid list-content required"> <div class=col-1-4>税种</div> <div class=col-3-4> <select name=sex id=sexSelect ng-model=picker.type ng-options="item.value as item.value for item in resiTypeList"> <option>选择税种类型</option> </select> </div> </div> <div class="grid list-content required"> <div class=col-1-4>税率(%)</div> <div class=col-3-4> <input type=text tel-directive ng-model=picker.rate> </div> </div> <div class="grid list-content required"> <div class=col-1-4>税额(元)</div> <div class=col-3-4> <input type=text tel-directive ng-model=picker.amount> </div> </div> </div> <div class="pickceritem-btn tc flex"> <div class=cancel ng-click=cacelCertificate()>取消</div> <div class=confirm ng-click=addCertificate()>确定</div> </div> </div>
