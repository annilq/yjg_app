<div class=header> <back-btn></back-btn> 报销单 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required"> <div class=item-label>收款人</div> <div class=flow-content> <input type=text ng-model=param.receivePerson> <p class=project_name ng-click=showSearchPicker()></p> </div> </div> <div class=list-item> <div class=item-label>收款人账号</div> <div class=flow-content> <input type=text ng-model=param.receiveAccount> </div> </div> <div class=list-item> <div class=item-label>收款人开户行</div> <div class=flow-content> <input type=text ng-model=param.receiveBank> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>报销事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark placeholder=内容字数不能大于500></textarea> </div> </div> <div rela-module taskid=process_id param=param rel=BX_MODULE></div> <div class="info-title required"> <div class=item-label>报销单明细 <span class="c-blue fr" ng-click=showCertificate(-1)>+添加</span> </div> </div> <div class="list table-list"> <div class=table-item ng-repeat="item in param.details"> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> <div class=content ng-class="{cur:$index==index}" ng-click=edit($index) ng-swipe-right=resetlist() ng-swipe-left=swipe($index)> <div class=list-item> <div class=item-label>报销类型</div> <div class=flow-content>{{item.resiType}}</div> </div> <div class=list-item> <div class=item-label>单据数量</div> <div class=flow-content>{{item.receiptsSum}}</div> </div> <div class=list-item> <div class=item-label>金额</div> <div class=flow-content>{{item.amount}}</div> </div> <div class=list-item> <div class=item-label>备注</div> <div class=flow-content>{{item.remark_}}</div> </div> </div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div> <div class="list tablestyle pickceritem" ng-show=showCerPicker> <div class=list-item> <div class="list-item list-content required"> <div class=col-1-4>报销类型</div> <div class=col-3-4> <select name=sex id=sexSelect ng-model=picker.resiType ng-options="item.value as item.value for item in resiTypeList"> <option>选择报销类型</option> </select> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>单据数量</div> <div class=col-3-4> <input type=tel ng-model=picker.receiptsSum tel-directive positive> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>金额</div> <div class=col-3-4> <input type=text ng-model=picker.amount tel-directive> </div> </div> <div class="list-item list-content"> <div class=col-1-4>备注</div> <div class=col-3-4> <input type=text ng-model=picker.remark_> </div> </div> </div> <div class="pickceritem-btn tc flex"> <div class=cancel ng-click=cacelCertificate()>取消</div> <div class=confirm ng-click=addCertificate()>确定</div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div> <div search-input show-search-input=showSearchInput apiurl=apiurl handle-search=handleSearch param=searchparam title=searchtitle></div>
