<div class=header> <back-btn></back-btn> 外经证 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item required"> <div class=item-label>工程来源</div> <label class=flow-content> <select ng-model=param.formKey ng-options="item.value as item.key for item in projectsource" ng-change="param.projectName=''"> <option>请选择</option> </select> </label> </div> <div class="list-item icon_more required" ng-click=chooseinfo()> <div class=item-label>工程名称</div> <div class=flow-content>{{param.projectName}} </div> </div> <div class="list-item required"> <div class=item-label>预计有效期至</div> <div class=flow-content> <input type=text date-directive ng-model=param.validityDate></div> </div> <div class="list-item required"> <div class=item-label>开具金额</div> <div class=flow-content> <input type=text ng-model=param.money tel-directive> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>工程所在地税务部门报验需要的相关资料</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.projectAddress placeholder=内容字数不能大于500></textarea> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark placeholder=备注内容字数不能大于500></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
