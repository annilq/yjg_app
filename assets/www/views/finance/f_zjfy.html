<div class=header> <back-btn></back-btn> 证件费用 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item required icon_more"> <div class=item-label>证件合同编号</div> <div class=flow-content ng-click=chooseinfo()> <input type=text ng-model=param.contractNo readonly> </div> </div> <div class="list-item readonly"> <div class=item-label>证件类别</div> <div class=flow-content> <input readonly type=text ng-model=param.certificateType> </div> </div> <div class="list-item readonly"> <div class=item-label>姓名</div> <div class=flow-content> <input readonly type=text ng-model=param.ownerName> </div> </div> <div class="list-item readonly"> <div class=item-label>专业</div> <div class=flow-content> <input readonly type=text ng-model=param.major> </div> </div> <label class="list-item readonly"> <div class=item-label>合同开始日期</div> <div class=flow-content> {{param.contractStratDate|dateFmt}} </div> </label> <label class="list-item readonly"> <div class=item-label>合同结束日期</div> <div class=flow-content> {{param.contractEndDate|dateFmt}} </div> </label> <div class="list-item readonly"> <div class=item-label>证件费用</div> <div class=flow-content> <input readonly type=text ng-model=param.affiliateAmount> </div> </div> <div class="list-item readonly"> <div class=item-label>付款方式</div> <div class=flow-content> <input readonly type=text ng-model=param.payWay> </div> </div> <div class="list-item required"> <div class=item-label>本次支付金额</div> <div class=flow-content> <input type=tel ng-model=param.currentPayAmount class=c0 tel-directive> </div> </div> <div class="list-item required"> <div class=item-label>本次支付使用时间段</div> <div class="flow-content flex"> <div class="w45 icon_more"> <input type=text date-directive ng-model=param.curentPayDate placeholder=起始时间> </div> <div class="w10 tc"> 至 </div> <div class="w45 icon_more"> <input type=text date-directive ng-model=param.nextPayDateNew placeholder=结束时间> </div> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark placeholder=备注内容字数不能大于500></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
