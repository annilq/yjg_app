<div class=header> <back-btn></back-btn> 收款 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item required icon_more"> <div class=item-label>交款人</div> <div class=flow-content> <input type=text ng-model=param.payPerson ng-disabled=param.userId> <p class=project_name ng-click=choosePeople()></p> </div> </div> <div class=list-item> <div class=item-label>交款部门</div> <div class=flow-content> <input type=text ng-model=param.departmentName> </div> </div> <div class="list-item icon_more required"> <div class=item-label>收款类型</div> <label class="flow-content mulselect"> <div class=mul-result> {{param.payTypeArr.toString()}} </div> <select multiple ng-multiple=true ng-model=param.payTypeArr ng-options="item.value as item.key for item in payTypeList"> </select> </label> </div> <div class="list-item required"> <div class=item-label>收款金额</div> <div class=flow-content> <input type=text ng-model=param.amount tel-directive> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>收款事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div> <div rela-module taskid=process_id param=param rel=OTH_MODULE></div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.desc></textarea> </div> </div> <div class="info-title required"> <div class=item-label>收款明细</div> </div> <span class="c-blue list-item tc" ng-click=showCertificate() ng-show="param.detailKips.length<1">+添加</span> <div class="list table-list"> <div class=table-item ng-repeat="item in param.detailKips"> <div class="delete_icon icon_del" ng-click=deletedItem($index)></div> <div class=content ng-class="{cur:$index==index}" ng-click=resetlist() ng-swipe-left=swipe($index) ng-swipe-right=swipe(-1)> <div class=list-item> <div class=item-label>收款类型</div> <div class=flow-content>{{item.name}}</div> </div> <div class=list-item> <div class=item-label>金额</div> <div class=flow-content>{{item.value}}</div> </div> <div class=list-item> <div class=item-label>备注</div> <div class=flow-content>{{item.content}}</div> </div> <span class="c-blue list-item tc" ng-click=showCertificate() ng-show="param.detailKips.length-1==$index">+添加</span> </div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div> <div class="list tablestyle pickceritem" ng-show=showCerPicker> <div class=list-item> <div class="list-item list-content required"> <div class=col-1-4>收款类型</div> <div class=col-3-4> <select name=sex id=sexSelect ng-model=picker.name ng-options="item.value as item.value for item in resiTypeList"> <option>选择收款类型</option> </select> </div> </div> <div class="list-item list-content required"> <div class=col-1-4>金额</div> <div class=col-3-4> <input type=text ng-model=picker.value tel-directive> </div> </div> <div class="list-item list-content"> <div class=col-1-4>备注</div> <div class=col-3-4> <input type=text ng-model=picker.content> </div> </div> </div> <div class="pickceritem-btn tc flex"> <div class=cancel ng-click=cacelCertificate()>取消</div> <div class=confirm ng-click=addCertificate()>确定</div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
