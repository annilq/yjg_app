<div class=header> <back-btn></back-btn> 成本发票 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more" ng-click=choosePeople()> <div class=item-label>工程名称</div> <div class=flow-content> {{param.projectName}} </div> </div> <div class="list-item icon_more"> <div class=item-label>通用合同编号</div> <div class=flow-content> <input type=text ng-model=param.commonContractNo ng-disabled="disableInput||param.payType==3"> <p class=project_name ng-click=chooseContract()></p> </div> </div> <div class="list-item icon_more" ng-click=choosegck()> <div class=item-label>工程款编号</div> <div class=flow-content> {{param.projectMoneyNo}} </div> </div> <div class="list-item required"> <div class=item-label>发票编号</div> <div class=flow-content> <input type=text ng-model=param.invoiceNo> </div> </div> <div class="list-item icon_more required"> <div class=item-label>开票日期</div> <div class=flow-content> <input type=text ng-model=param.openDate date-directive> </div> </div> <div class="list-item icon_more required"> <div class=item-label>发票类型</div> <label class=flow-content> <select ng-model=param.invoiceType ng-options="item.value as item.key for item in payTypeList"> <option>请选择</option> </select> </label> </div> <div class="list-item icon_more required"> <div class=item-label>电子发票</div> <label class=flow-content> <select ng-model=param.electronic> <option>请选择</option> <option value=1>是</option> <option value=0>否</option> </select> </label> </div> <div class="list-item icon_more required"> <div class=item-label>商品类型</div> <label class=flow-content> <select ng-model=param.goodsType ng-options="item.value as item.key for item in proList"> <option>请选择</option> </select> </label> </div> <div class="list-item required icon_more"> <div class=item-label>税率</div> <label class=flow-content> <select ng-model=param.rate ng-options="item.value as item.key for item in rateList"> <option>请选择</option> </select> </label> </div> <div class="list-item required"> <div class=item-label>发票金额</div> <div class=flow-content> <input type=text ng-model=param.amount> </div> </div> <div class="list-item icon_more required"> <div class=item-label>是否含税</div> <div class=flow-content> <select ng-model=param.includingVat ng-options="item.value as item.key for item in vatlist"> </select> </div> </div> <div class="list-item required"> <div class=item-label>税额</div> <div class=flow-content> <input type=text ng-model=param.taxAmount tel-directive> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>发票详情</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.invoiceDetails placeholder=发票详情 maxlength=500></textarea> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark placeholder=内容字数不能大于500 maxlength=500></textarea> </div> </div> <div class="list table-list"> <div class=info-title>销售方信息</div> <div class=table-item> <div class="list-item required"> <div class=item-label>名称</div> <div class=flow-content> <input type=text ng-model=param.sellerName> </div> </div> <div class=list-item> <div class=item-label>纳税人识别号</div> <div class=flow-content> <input type=text ng-model=param.sellerTaxNo> </div> </div> <div class=list-item> <div class=item-label>地址,电话 </div> <div class=flow-content> <input type=text ng-model=param.sellerContactWay> </div> </div> <div class=list-item> <div class=item-label>开户行及账号</div> <div class=flow-content> <input type=text ng-model=param.sellerBankInfo> </div> </div> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
