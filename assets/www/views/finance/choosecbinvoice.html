<div class=header> <back-btn cleancache=no></back-btn> 成本发票 </div> <div class="container finacetablestyle"> <div class=search_input_wrapper> <input type=text class=search_input ng-model=sellerName ng-model-options="{ debounce: 1000 }" ng-change=search(sellerName) placeholder={{taskList.title}}> </div> <div class="list table-list f_sk" infinite-scroll=taskList.nextPage() infinite-scroll-disabled=taskList.busy infinite-scroll-distance=0 infinite-scroll-container='".finacetablestyle"'> <div class=table-item ng-click=choosePeople(item) ng-class="{'selected':item.selected}" ng-repeat="item in taskList.items"> <div class=list-item ng-repeat="(key,value) in taskList.porlist"> <div class=item-label>{{key}}</div> <div class=flow-content>{{item[value.name]|listvalueFmt:value.value}}</div> </div> <div class=list-masker></div> </div> <div ng-show=!taskList.items.length class="noData tc">{{taskList.tip}}</div> </div> </div> <div class="flex footer tc" ng-show=selectLists.length ng-click=submit()> <div class="b-btn w50">确定</div> </div>
