<div class=header> <back-btn></back-btn> 考勤详情 </div> <div class=container> <div class="list f_sk"> <label class="list-item icon_more mt10"> <p class=item-label>每日打卡次数</p> <p class=flow-content> <select ng-model=attendanceDetail.param.haveToAdTimes> <option value=2>2</option> <option value=4>4</option> </select> </p> </label> <label class="list-item icon_more required"> <p class=item-label>上午上班时间</p> <p class=flow-content> <input type=text date-directive ng-model=attendanceDetail.startTime class=c0 datetype=time> </p> </label> <label class="list-item icon_more required" ng-show="attendanceDetail.param.haveToAdTimes==4"> <p class=item-label>上午下班时间</p> <p class=flow-content> <input type=text date-directive ng-model=attendanceDetail.endTime2 class=c0 datetype=time> </p> </label> <label class="list-item icon_more required" ng-show="attendanceDetail.param.haveToAdTimes==4"> <p class=item-label>下午上班时间</p> <p class=flow-content> <input type=text date-directive ng-model=attendanceDetail.startTime2 class=c0 datetype=time> </p> </label> <label class="list-item icon_more required"> <p class=item-label>下午下班时间</p> <p class=flow-content> <input type=text date-directive ng-model=attendanceDetail.endTime class=c0 datetype=time> </p> </label> <label class="list-item icon_more required" ng-click=attendanceDetail.showrelModule()> <p class=item-label>考勤时间</p> <p class="flow-content te"> {{attendanceDetail.param.cycleTime}} </p> </label> <label class="list-item icon_more required mt10"> <p class=item-label>考勤对象类型</p> <p class="flow-content te"> <select ng-model=attendanceDetail.param.clockObject> <option value=0>部门</option> <option value=1>用户</option> </select> </p> </label> <label class="list-item icon_more required" ng-show="attendanceDetail.param.clockObject==0" ng-click=attendanceDetail.showdeps()> <p class=item-label>考勤部门</p> <p class=flow-content> {{attendanceDetail.param.departments}} </p> </label> <div class="list-item icon_more" ng-show="attendanceDetail.param.clockObject==0" ng-click=attendanceDetail.showusers()> <p class=item-label>无需考勤成员</p> <p class=flow-content> {{attendanceDetail.param.exclusionUsers.length?attendanceDetail.param.exclusionUsers.length+"人":""}} </p> </div> <div class="list-item icon_more required" ng-show="attendanceDetail.param.clockObject==1" ng-click=attendanceDetail.chooseusers()> <p class=item-label>考勤成员</p> <p class=flow-content style="white-space: normal;"> {{attendanceDetail.param.userNames}} </p> </div> <div class="list-item icon_more required mt10" ng-click=attendanceDetail.showMap()> <p class=item-label>考勤地点</p> <p class="flow-content fs12 te">{{attendanceDetail.param.address}} </p> </div> <label class="list-item icon_more"> <p class=item-label>允许偏差(米)</p> <p class=flow-content> <select ng-model=attendanceDetail.param.allowableOffset ng-options="offset for offset in attendanceDetail.offsets"> <option>请选择</option> </select> </p> </label> <label class="list-item icon_more" ng-click=attendanceDetail.choosewifi()> <p class=item-label>WIFI连接</p> <p class="flow-content te"> {{attendanceDetail.wifistr}} </p> </label> <label class="list-item icon_more mt10"> <p class=item-label>打卡方式</p> <p class=flow-content> <select ng-model=attendanceDetail.param.clockWay ng-options="item.value as item.key for item in attendanceDetail.clockWays"> <option>请选择</option> </select> </p> </label> <label class="list-item icon_more"> <p class=item-label>考勤拍照</p> <p class=flow-content> <select ng-model=attendanceDetail.param.clockWithSelfie ng-options="item.value as item.key for item in attendanceDetail.clockWithSelfies"> <option>请选择</option> </select> </p> </label> </div> </div> <div class="flex footer tc"> <div class="w50 c-blue" ng-click=attendanceDetail.submit()> <span class=submit-flow></span>完成</div> <div class=w50 ng-click=attendanceDetail.confirmdel() ng-show=attendanceDetail.pkId> <span class=delete-flow></span>删除</div> </div> <cus-select ng-show=attendanceDetail.sheetObj.ifshowSheet sheet-data=attendanceDetail.sheetObj></cus-select>
