<div class=header> <back-btn></back-btn> 考勤管理 </div> <div class="container attendance-list"> <div class=list> <div class="list-item mt10" ng-repeat="item in attendanceList.list" ng-click=attendanceList.goAttendanceDetail(item.pkId)> <div class="icon_enter celled te lh30 attendance_header">{{item.users||item.departments}}</div> <div class="c9 fs14 attendance_detail"> <p>{{item.cycleTime}}</p> <div class=flex> <p>上午上班时间:{{item.onDutyHourAm|timeFormat}}:{{item.onDutyMintueAm|timeFormat}}</p> <p>下午下班时间:{{item.offDutyHourPm|timeFormat}}:{{item.offDutyMintuePm|timeFormat}}</p> </div> </div> <div class=c-blue ng-show=item.updateDate|isCurDate>明天开始生效</div> </div> </div> </div> <div class="flex footer tc"> <div class="w50 c-blue" ng-click=attendanceList.addAttendance()> <span class=new-kq></span> 新建考勤组</div> </div>
