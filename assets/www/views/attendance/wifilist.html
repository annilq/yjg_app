<div class=header> <back-btn></back-btn> 考勤详情 </div> <div class=container> <div class=list> <p class=wifi-section>已选择的WIFI</p> <div class="list-item wifi-item selected" ng-repeat="item in Wifilist.selectWifis"> <div class=wifi-del-icon ng-click=Wifilist.remWifiConfirm(item)></div> <div class=wifi-item-content> <p class="wifi-title fs16 c0">{{item.name}}</p> <p class="wifi-detail fs12"> {{item.mac}} </p> </div> </div> <div class="list-item lh50 tc" ng-show="Wifilist.selectWifis.length==0"> 没有选择打卡的wifi </div> <p class=wifi-section>添加新WIFI</p> <div class="list-item wifi-item new" ng-repeat="item in Wifilist.scanWifis" ng-class={connected:item.isConntected}> <div class=wifi-add-icon ng-click=Wifilist.addWifiConfirm(item)></div> <div class=wifi-item-content> <p class="wifi-title fs16 c0">{{item.name}}</p> <p class="wifi-detail fs12"> {{item.mac}} </p> </div> </div> <div class="list-item lh50 tc" ng-show="Wifilist.scanWifis.length==0"> 搜索不到附近wifi </div> </div> </div> <div class="flex footer tc"> <div class=c-blue ng-click=Wifilist.confirm()> <span class=submit-flow></span>确定</div> </div>
