<div class=item-userDefined ng-show=fieldMap> <div class=section-hr> <span ng-repeat="item in formData" ng-switch=item.fieldType> <div class="list-item flex" ng-class='{"mt0":$first}' ng-switch-default> <div class=label> {{item.fieldLabel}} </div> <div class=w60 ng-if="item.fieldType!=9"> <p ng-if="item.value.indexOf('http')>-1" ng-click=hrefLink(item.value) class=c-succ>{{item.value}}</p> <p ng-if="item.value.indexOf('http')==-1">{{item.value}}</p> </div> <div class=w60 ng-if="item.fieldType==9" relative-module={{item.hideProperty}} module-no={{item.value}}> {{item.value}} </div> </div> <div class=file-upload file-list checked=true file-data=item.value ng-switch-when=10></div> </span> </div></div>
