<div class=header> <back-btn cleancache=no></back-btn> </div> <div class=container> <div class="file-folder-title fs18" ng-hide="rootFolderId==curID" ng-click=goPreFolder()> {{folderName}} </div> <div class=search_input_wrapper> <input type=text class=search_input ng-model=filterSql ng-model-options="{ debounce: 1000 }" placeholder=搜索> </div> <div class="list file-list f_sk"> <div class=list-item ng-class="{'isfolder':item.isFolder}" ng-click=itemClick(item) ng-repeat="item in fileList|filter:{ fileName: filterSql }"> <div class=item-label ng-class=item.fileType|fileTypeAvtar></div> <div class=flow-content> <p class="c0 fs16">{{item.fileName}}</p> <p class="fs14 filedesp" ng-show="item.isFolder!=1"><span class=file-size>{{item.fileLength|fileSize}}</span> {{item.createDate|dateFmt:"yyyy-MM-dd hh:mm "}}</p> </div> </div> <div ng-show=!fileList.length class="noData tc">{{taskList.tip}}</div> </div> </div> <div class=picture-file-upload ng-show=hasFilePermission ng-click=uploadfile()></div>
