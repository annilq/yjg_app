<div class=header> <back-btn></back-btn> 案件登记 </div> <div class="container finance"> <div class="list f_sk"> <div class="list-item icon_more required"> <div class=item-label>案件登记类型</div> <label class=flow-content> <select ng-model=param.caseType ng-options="item.value as item.key for item in typeList"> <option>请选择</option> </select> </label> </div> <label class="list-item icon_more"> <p class=item-label>案件开庭日期</p> <p class=flow-content> <input type=text date-directive id=start_date ng-model=param.openCaseDate> </p> </label> <label class="list-item icon_more required"> <p class=item-label>案件接收日期 </p> <p class=flow-content> <input type=text date-directive id=end_date ng-model=param.receiveCaseDate> </p> </label> <div class="list-item required"> <div class=item-label>案发城市</div> <div class=flow-content> <input type=text ng-model=param.caseCity> </div> </div> <div rela-module taskid=process_id param=param rel=AJDJ_MODULE></div> <div class="list-item list-item-textarea required"> <div class=item-label>案件描述</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.caseDesc></textarea> </div> </div> <div class="list-item list-item-textarea"> <div class=item-label>备注</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.remark></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.filePath> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
