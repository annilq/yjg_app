<div class=header> <back-btn></back-btn> 出差条 </div> <div class="container finance"> <div class="list f_sk"> <label class="list-item icon_more required"> <p class=item-label>出差起始日期</p> <p class=flow-content> <input type=text date-directive id=start_date datetype=datetime ng-model=param.startTravelDate> </p> </label> <label class="list-item icon_more required"> <p class=item-label>出差结束日期</p> <p class=flow-content> <input type=text date-directive id=end_date datetype=datetime ng-model=param.endTravelDate> </p> </label> <div class="list-item required"> <div class=item-label>出差时长</div> <div class=flow-content> <input type=text ng-model=param.days tel-directive> </div> </div> <div class="list-item required"> <div class=item-label>出差单位</div> <label class=flow-content> <select ng-model=param.unit ng-options="item.value as item.key for item in unitList"> <option>请选择</option> </select> </label> </div> <div class="list-item required"> <div class=item-label>出差城市</div> <div class=flow-content> <input type=text ng-model=param.travelCity> </div> </div> <div class="list-item list-item-textarea required"> <div class=item-label>出差事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.reason></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment></div>  <div log-list status=processStatus taskid=process_id></div> </div> </div> <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
