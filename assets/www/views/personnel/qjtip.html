<div class=header> <back-btn></back-btn> 请假条 </div> <div class="container finance"> <div class="list f_sk">  <label class="list-item icon_more required"> <p class=item-label>请假起始日期</p> <p class=flow-content> <input type=text date-directive id=start_date ng-model=param.beginTime datetype=datetime> </p> </label> <label class="list-item icon_more required"> <p class=item-label>请假结束日期</p> <p class=flow-content> <input type=text date-directive id=end_date ng-model=param.endTime datetype=datetime> </p> </label> <div class="list-item icon_more required"> <div class=item-label>请假类型</div> <label class=flow-content> <select ng-model=param.type ng-options="item.value as item.key for item in qingjTypeList" ng-change=typechange()> <option>请选择</option> </select> </label> </div> <div class="px10 c-red fs14 lh30" ng-show="param.type=='年假'">{{tip}}</div> <div class="list-item required"> <div class=item-label>请假时长</div> <div class=flow-content> <input type=text ng-model=param.leaveDays tel-directive> </div> </div> <div class="list-item icon_more required"> <div class=item-label>时间单位</div> <label class=flow-content> <select ng-model=param.unit ng-options="item.value as item.key for item in timeUnitList"> <option>请选择</option> </select> </label> </div> <div class="list-item list-item-textarea required"> <div class=item-label>请假事由</div> <div class=flow-content> <textarea cols=30 rows=10 ng-model=param.reson></textarea> </div> </div>  <div user-defined param=param field-map=param.fieldMap validation=validation uid=param.uid processid=param.processInstanceId></div>  <div class=file-upload file-upload file-data=param.attachment> </div>  <div log-list status=processStatus taskid=process_id></div> </div> </div>  <div delete-flow uid=param.uid id={{param.processInstanceId}} submit=submit validate=validate></div>
